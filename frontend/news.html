<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모닝 리포트 — My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --color-up: #16a34a;
            --color-down: #dc2626;
            --color-neutral: #6b7280;
            --bg-main: #f1f5f9;
            --card-radius: 0.875rem;
        }
        body { background: var(--bg-main); font-family: 'Inter', sans-serif; color: #1e293b; }
        .navbar { box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .section-card {
            border: none; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .section-title {
            font-size: .8rem; font-weight: 600; letter-spacing: .06em;
            text-transform: uppercase; color: #64748b; margin-bottom: 1rem;
        }
        .text-up   { color: var(--color-up) !important; }
        .text-down { color: var(--color-down) !important; }
        .text-neutral { color: var(--color-neutral) !important; }
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg-main); z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }

        /* === Sidebar navigation === */
        html { scroll-behavior: smooth; }
        @media (min-width: 992px) {
            #sidebar {
                position: fixed; top: 0; left: 0;
                width: 240px; height: 100vh;
                border-right: 1px solid #e2e8f0;
                background: #fff;
                display: flex; flex-direction: column;
                z-index: 20;
            }
            body.has-sidebar > nav.navbar,
            body.has-sidebar > #main-content,
            body.has-sidebar > #loading-overlay { margin-left: 240px; }
        }
        .sidebar-link {
            display: flex; align-items: center; gap: .6rem;
            padding: .55rem 1rem;
            color: #475569; text-decoration: none;
            font-size: .88rem;
            border-left: 3px solid transparent;
        }
        .sidebar-link:hover:not(.disabled) { background: #f8fafc; color: #0f172a; }
        .sidebar-link.active {
            background: #eff6ff; color: #1d4ed8;
            border-left-color: #1d4ed8; font-weight: 600;
        }
        .sidebar-link.disabled { color: #cbd5e1; cursor: not-allowed; }
        .sidebar-group-label {
            font-size: .7rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: .08em;
            padding: 1rem 1rem .4rem;
        }
        .sidebar-footer {
            padding: 1rem; border-top: 1px solid #e2e8f0;
            margin-top: auto;
        }
        .sidebar-link .badge { margin-left: auto; }
        .sidebar-stock {
            display: flex; align-items: center; gap: .5rem;
            padding: .4rem 1rem .4rem 1.8rem;
            color: #64748b; text-decoration: none;
            font-size: .8rem;
            border-left: 3px solid transparent;
            transition: background .15s;
        }
        .sidebar-stock:hover { background: #f8fafc; color: #0f172a; }
        .sidebar-stock.active { background: #eff6ff; color: #1d4ed8; border-left-color: #1d4ed8; font-weight: 600; }
        .sidebar-stock .stock-ticker { font-weight: 600; color: #334155; min-width: 3rem; }
        .sidebar-stock.active .stock-ticker { color: #1d4ed8; }
        .sidebar-stock .stock-name { color: #94a3b8; font-size: .72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-stock .stock-pnl { margin-left: auto; font-size: .72rem; font-weight: 600; }

        /* === News-specific === */
        .news-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #f1f5f9;
            transition: background .15s;
        }
        .news-item:last-child { border-bottom: none; }
        .news-item:hover { background: #f8fafc; }
        .news-item-title {
            font-weight: 600; font-size: .95rem;
            color: #1e293b; margin-bottom: .35rem;
        }
        .news-item-summary {
            font-size: .85rem; color: #475569;
            line-height: 1.65; margin-bottom: .5rem;
        }
        .news-item-impact {
            font-size: .82rem; padding: .5rem .75rem;
            background: rgba(59,130,246,.06);
            border-left: 3px solid #3b82f6;
            border-radius: 0 6px 6px 0;
            color: #1e40af; margin-bottom: .5rem;
        }
        .news-item-meta {
            font-size: .72rem; color: #94a3b8;
            display: flex; align-items: center; gap: .75rem;
        }
        .news-item-meta a { color: #3b82f6; text-decoration: none; }
        .news-item-meta a:hover { text-decoration: underline; }
        .ticker-badge {
            display: inline-flex; align-items: center;
            padding: .15rem .45rem; border-radius: 4px;
            font-size: .7rem; font-weight: 600;
            background: rgba(22,163,74,.1); color: var(--color-up);
        }
        .importance-dots { display: inline-flex; gap: 2px; }
        .importance-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #cbd5e1;
        }
        .importance-dot.filled { background: #f59e0b; }
        .cat-icon-macro    { background: rgba(59,130,246,.12); color: #2563eb; }
        .cat-icon-stock    { background: rgba(22,163,74,.12);  color: #16a34a; }
        .cat-icon-crypto   { background: rgba(168,85,247,.12); color: #9333ea; }
        .cat-icon-sentiment{ background: rgba(245,158,11,.12); color: #d97706; }
        .cat-icon-hiring   { background: rgba(236,72,153,.12); color: #db2777; }
        .indicator-card {
            border: none; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            text-align: center; padding: 1rem;
        }
        .indicator-value { font-size: 1.5rem; font-weight: 700; }
        .indicator-label { font-size: .72rem; color: #94a3b8; text-transform: uppercase; font-weight: 600; letter-spacing: .05em; }
        .cat-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 8px;
            font-size: 1rem;
        }
        .date-nav .btn { font-size: .85rem; }
        .report-date-title { font-size: 1.25rem; font-weight: 700; }

        /* === List view === */
        .view-toggle .btn { font-size: .82rem; padding: .3rem .75rem; }
        .view-toggle .btn.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
        .report-list-item {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            transition: background .15s;
        }
        .report-list-item:last-child { border-bottom: none; }
        .report-list-item:hover { background: #f8fafc; }
        .report-list-date { font-weight: 700; font-size: .95rem; color: #1e293b; }
        .report-list-meta { font-size: .72rem; color: #94a3b8; }
        .report-list-preview {
            font-size: .85rem; color: #475569;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            max-width: 100%;
        }
        #btn-load-more {
            display: block; margin: 1rem auto;
            font-size: .85rem;
        }
    </style>
</head>
<body class="has-sidebar">

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
    <div class="text-center text-muted">
        <div class="spinner-border spinner-border-sm mb-2"></div>
        <div style="font-size:.85rem;">불러오는 중...</div>
    </div>
</div>

<!-- Sidebar navigation -->
<aside id="sidebar" class="offcanvas-lg offcanvas-start" tabindex="-1" aria-labelledby="sidebar-label">
    <div class="offcanvas-header border-bottom">
        <span id="sidebar-label" class="fw-bold">
            <i class="bi bi-bar-chart-line-fill text-primary"></i> My Portfolio
        </span>
        <button type="button" class="btn-close d-lg-none"
                data-bs-dismiss="offcanvas" data-bs-target="#sidebar" aria-label="Close"></button>
    </div>
    <nav class="offcanvas-body d-flex flex-column p-0">
        <a href="/" class="sidebar-link"><i class="bi bi-speedometer2 me-2"></i>대시보드</a>

        <div class="sidebar-group-label">개인종목</div>
        <div id="sidebar-assets"></div>

        <div class="sidebar-group-label">분석</div>
        <a href="/news.html" class="sidebar-link active"><i class="bi bi-newspaper me-2"></i>뉴스 리포트</a>
        <a href="/market.html" class="sidebar-link"><i class="bi bi-globe me-2"></i>시장 상황판</a>

        <div class="sidebar-group-label">도구</div>
        <span class="sidebar-link disabled">가격 알림 <span class="badge text-bg-light">준비중</span></span>
        <span class="sidebar-link disabled">리밸런싱 <span class="badge text-bg-light">준비중</span></span>
        <span class="sidebar-link disabled">트레이드 저널 <span class="badge text-bg-light">준비중</span></span>
        <span class="sidebar-link disabled">수익 실현 계산기 <span class="badge text-bg-light">준비중</span></span>

        <div class="sidebar-group-label">기타</div>
        <span class="sidebar-link disabled">설정 <span class="badge text-bg-light">준비중</span></span>

        <div class="sidebar-footer">
            <button onclick="logout()" class="btn btn-sm btn-outline-secondary w-100">
                <i class="bi bi-box-arrow-right"></i> 로그아웃
            </button>
        </div>
    </nav>
</aside>

<!-- Mobile navbar (only visible <992px) -->
<nav class="navbar navbar-light bg-white border-bottom px-3 py-2 d-lg-none">
    <button class="btn btn-sm" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#sidebar"
            aria-controls="sidebar" aria-label="메뉴 열기">
        <i class="bi bi-list fs-4"></i>
    </button>
    <span id="nav-title" class="fw-semibold fs-6">모닝 리포트</span>
    <span style="width:32px"></span>
</nav>

<div id="main-content" class="container-xl py-4" style="display:none;">

    <!-- 오류 배너 -->
    <div id="error-banner" class="alert alert-danger d-none mb-3" style="font-size:.85rem;"></div>

    <!-- 헤더 + 뷰 토글 + 날짜 네비게이션 -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="d-flex align-items-center gap-3">
            <h1 class="report-date-title mb-0">
                <i class="bi bi-newspaper text-primary"></i>
                <span id="header-report">모닝 리포트 — <span id="report-date">—</span></span>
                <span id="header-list" class="d-none">뉴스 리포트</span>
            </h1>
            <div class="view-toggle btn-group btn-group-sm">
                <button id="btn-view-report" class="btn btn-outline-secondary active">리포트</button>
                <button id="btn-view-list" class="btn btn-outline-secondary">목록</button>
            </div>
        </div>
        <div id="date-nav" class="date-nav d-flex align-items-center gap-2">
            <button id="btn-prev" class="btn btn-sm btn-outline-secondary" disabled>
                <i class="bi bi-chevron-left"></i> 이전
            </button>
            <button id="btn-next" class="btn btn-sm btn-outline-secondary" disabled>
                다음 <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- AI 분석 요약 카드 -->
    <div id="summary-card" class="section-card bg-white p-4 mb-3 d-none">
        <div class="d-flex align-items-center gap-2 mb-2">
            <span class="cat-icon cat-icon-macro"><i class="bi bi-robot"></i></span>
            <span class="section-title mb-0">AI 분석 요약</span>
        </div>
        <p id="summary-text" style="font-size:.9rem; line-height:1.7; color:#334155; margin-bottom:.75rem;"></p>
        <div class="d-flex gap-3 flex-wrap" style="font-size:.78rem; color:#94a3b8;">
            <span><i class="bi bi-collection"></i> 수집 <strong id="total-collected" class="text-dark">—</strong>건</span>
            <span><i class="bi bi-funnel"></i> 선별 <strong id="total-selected" class="text-dark">—</strong>건</span>
            <span><i class="bi bi-cpu"></i> <span id="model-used">—</span></span>
            <span><i class="bi bi-clock"></i> <span id="created-at">—</span></span>
        </div>
    </div>

    <!-- 시장 지표 카드 -->
    <div id="indicators-row" class="row g-3 mb-3 d-none"></div>

    <!-- 뉴스 섹션들 -->
    <div id="news-sections"></div>

    <!-- 리스트 뷰 -->
    <div id="list-view" class="d-none">
        <div id="report-list" class="section-card bg-white"></div>
        <button id="btn-load-more" class="btn btn-sm btn-outline-secondary d-none">더보기</button>
    </div>

    <!-- 빈 상태 -->
    <div id="empty-state" class="text-center py-5 d-none">
        <i class="bi bi-newspaper text-muted" style="font-size:3rem;"></i>
        <p class="text-muted mt-3" style="font-size:.95rem;">아직 생성된 리포트가 없습니다</p>
        <button id="btn-generate" class="btn btn-primary btn-sm mt-2" onclick="generateReport()">
            <i class="bi bi-magic"></i> 리포트 생성
        </button>
        <div id="generate-status" class="text-muted mt-2 d-none" style="font-size:.82rem;"></div>
    </div>

</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('portfolio_token'); }
function getAuthHeaders() {
    const t = getToken();
    if (!t) { window.location.href = '/login.html'; return null; }
    return { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' };
}
function logout() { localStorage.removeItem('portfolio_token'); window.location.href = '/login.html'; }

async function apiFetch(url) {
    const headers = getAuthHeaders();
    if (!headers) throw new Error('Unauthenticated');
    const res = await fetch(url, { headers });
    if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

// ── Sidebar asset list ───────────────────────────────────────────────────────
function renderSidebarAssets(assets) {
    const wrap = document.getElementById('sidebar-assets');
    const filtered = assets.filter(a => (a.quantity * a.avg_price) >= 10000);
    if (!filtered.length) { wrap.innerHTML = ''; return; }
    wrap.innerHTML = filtered.map(a => {
        const type = a.asset_type === 'stock' ? 'stock' : 'coin';
        const plr = a.profit_loss_rate;
        const cls = plr >= 0 ? 'text-up' : 'text-down';
        const sign = plr >= 0 ? '+' : '';
        const label = a.asset_type === 'stock' ? a.ticker : a.ticker.replace('KRW-', '');
        return `<a href="/detail.html?type=${type}&ticker=${encodeURIComponent(a.ticker)}" class="sidebar-stock">
            <span class="stock-ticker">${label}</span>
            <span class="stock-name">${a.name}</span>
            <span class="stock-pnl ${cls}">${sign}${(plr * 100).toFixed(1)}%</span>
        </a>`;
    }).join('');
}

async function loadSidebarAssets() {
    try {
        const data = await apiFetch('/api/portfolio');
        if (data.assets) renderSidebarAssets(data.assets);
    } catch(e) {
        console.error('sidebar assets error:', e);
    }
}

// ── Category config ──────────────────────────────────────────────────────────
const CATEGORIES = {
    macro:     { label: '거시경제 \u00b7 지정학', icon: 'bi-globe-americas',   iconClass: 'cat-icon-macro' },
    stock:     { label: '주식 종목',              icon: 'bi-graph-up-arrow',   iconClass: 'cat-icon-stock' },
    crypto:    { label: '암호화폐',               icon: 'bi-currency-bitcoin', iconClass: 'cat-icon-crypto' },
    sentiment: { label: '센티먼트 \u00b7 소셜',   icon: 'bi-chat-dots',        iconClass: 'cat-icon-sentiment' },
    hiring:    { label: '채용 \u00b7 기업 트렌드', icon: 'bi-briefcase',        iconClass: 'cat-icon-hiring' },
};

// ── Rendering functions ──────────────────────────────────────────────────────
function renderImportance(level) {
    let html = '<span class="importance-dots">';
    for (let i = 1; i <= 5; i++) {
        html += `<span class="importance-dot${i <= level ? ' filled' : ''}"></span>`;
    }
    html += '</span>';
    return html;
}

function renderNewsItem(item) {
    let html = `<div class="news-item">`;
    html += `<div class="news-item-title">${escapeHtml(item.title)}</div>`;
    html += `<div class="news-item-summary">${escapeHtml(item.summary)}</div>`;

    if (item.impact_analysis) {
        html += `<div class="news-item-impact"><i class="bi bi-lightbulb me-1"></i>${escapeHtml(item.impact_analysis)}</div>`;
    }

    html += `<div class="news-item-meta">`;
    if (item.related_ticker) {
        html += `<span class="ticker-badge">${escapeHtml(item.related_ticker)}</span>`;
    }
    if (item.source_url) {
        html += `<a href="${escapeHtml(item.source_url)}" target="_blank" rel="noopener">${escapeHtml(item.source || '원문')}</a>`;
    } else if (item.source) {
        html += `<span>${escapeHtml(item.source)}</span>`;
    }
    html += renderImportance(item.importance || 0);
    html += `</div>`;
    html += `</div>`;
    return html;
}

function renderSection(categoryKey, items) {
    const cat = CATEGORIES[categoryKey];
    if (!cat || !items.length) return '';

    let html = `<div class="section-card bg-white mb-3">`;
    html += `<div class="d-flex align-items-center gap-2 p-3 pb-0">`;
    html += `<span class="cat-icon ${cat.iconClass}"><i class="bi ${cat.icon}"></i></span>`;
    html += `<span class="fw-semibold" style="font-size:.95rem;">${cat.label}</span>`;
    html += `<span class="badge bg-light text-secondary" style="font-size:.7rem;">${items.length}</span>`;
    html += `</div>`;
    items.forEach(item => { html += renderNewsItem(item); });
    html += `</div>`;
    return html;
}

function renderMarketIndicators(indicators) {
    if (!indicators) return;
    const row = document.getElementById('indicators-row');
    row.classList.remove('d-none');

    const cards = [];

    if (indicators.fear_greed) {
        const fg = indicators.fear_greed;
        let color = '#f59e0b';
        if (fg.value <= 25) color = '#dc2626';
        else if (fg.value <= 45) color = '#f97316';
        else if (fg.value <= 55) color = '#6b7280';
        else if (fg.value <= 75) color = '#22c55e';
        else color = '#16a34a';
        cards.push(`
            <div class="col-4">
                <div class="indicator-card bg-white">
                    <div class="indicator-label">Fear & Greed</div>
                    <div class="indicator-value" style="color:${color}">${fg.value}</div>
                    <div style="font-size:.75rem; color:#64748b;">${escapeHtml(fg.label)}</div>
                </div>
            </div>`);
    }

    if (indicators.btc_dominance != null) {
        cards.push(`
            <div class="col-4">
                <div class="indicator-card bg-white">
                    <div class="indicator-label">BTC Dominance</div>
                    <div class="indicator-value">${indicators.btc_dominance}%</div>
                    <div style="font-size:.75rem; color:#64748b;">비트코인 점유율</div>
                </div>
            </div>`);
    }

    if (indicators.vix != null) {
        let vixColor = indicators.vix < 15 ? '#16a34a' : indicators.vix < 25 ? '#f59e0b' : '#dc2626';
        cards.push(`
            <div class="col-4">
                <div class="indicator-card bg-white">
                    <div class="indicator-label">VIX</div>
                    <div class="indicator-value" style="color:${vixColor}">${indicators.vix}</div>
                    <div style="font-size:.75rem; color:#64748b;">변동성 지수</div>
                </div>
            </div>`);
    }

    row.innerHTML = cards.join('');
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── State ────────────────────────────────────────────────────────────────────
let reportsList = [];
let currentReportIndex = -1;
let currentView = 'report'; // 'report' | 'list'
let listOffset = 0;
const LIST_LIMIT = 10;
let listHasMore = false;

// ── Manual report generation ────────────────────────────────────────────────
function showGeneratingState() {
    const btn = document.getElementById('btn-generate');
    const status = document.getElementById('generate-status');
    if (!btn || !status) return;
    document.getElementById('empty-state').classList.remove('d-none');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>생성 중...';
    status.classList.remove('d-none', 'text-success', 'text-danger');
    status.classList.add('text-muted');
    status.textContent = '뉴스 수집 및 분석 중입니다. 1~2분 소요됩니다...';
}

async function generateReport() {
    const btn = document.getElementById('btn-generate');
    const status = document.getElementById('generate-status');
    localStorage.setItem('news_generating', Date.now().toString());
    showGeneratingState();

    try {
        const headers = getAuthHeaders();
        if (!headers) return;
        const res = await fetch('/api/news/generate', { method: 'POST', headers });
        localStorage.removeItem('news_generating');
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || `HTTP ${res.status}`);
        }
        status.textContent = '리포트가 생성되었습니다!';
        status.classList.remove('text-muted');
        status.classList.add('text-success');
        setTimeout(() => {
            document.getElementById('empty-state').classList.add('d-none');
            loadReport();
            loadReportsList();
        }, 1000);
    } catch (e) {
        localStorage.removeItem('news_generating');
        status.textContent = '생성 실패: ' + e.message;
        status.classList.remove('text-muted');
        status.classList.add('text-danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-magic"></i> 리포트 생성';
    }
}

// ── View toggle ─────────────────────────────────────────────────────────────
function switchView(view) {
    currentView = view;
    const isReport = view === 'report';

    // Toggle active button
    document.getElementById('btn-view-report').classList.toggle('active', isReport);
    document.getElementById('btn-view-list').classList.toggle('active', !isReport);

    // Toggle header text
    document.getElementById('header-report').classList.toggle('d-none', !isReport);
    document.getElementById('header-list').classList.toggle('d-none', isReport);

    // Toggle sections
    document.getElementById('summary-card').classList.toggle('d-none', !isReport);
    document.getElementById('indicators-row').classList.toggle('d-none', !isReport);
    document.getElementById('news-sections').classList.toggle('d-none', !isReport);
    document.getElementById('date-nav').classList.toggle('d-none', !isReport);
    document.getElementById('list-view').classList.toggle('d-none', isReport);
    document.getElementById('empty-state').classList.add('d-none');

    if (!isReport) {
        listOffset = 0;
        document.getElementById('report-list').innerHTML = '';
        loadReportList();
    }
}

// ── List view ───────────────────────────────────────────────────────────────
async function loadReportList() {
    try {
        const data = await apiFetch(`/api/news/reports?offset=${listOffset}&limit=${LIST_LIMIT}`);
        const container = document.getElementById('report-list');

        (data.items || []).forEach(item => {
            const div = document.createElement('div');
            div.className = 'report-list-item';
            div.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="report-list-date">${escapeHtml(item.report_date)}</span>
                    <span class="report-list-meta">수집 ${item.total_collected}건 → 선별 ${item.total_selected}건 · ${escapeHtml(item.model_used || '')}</span>
                </div>
                <div class="report-list-preview">${escapeHtml(item.summary_preview || '')}</div>
            `;
            div.addEventListener('click', () => {
                switchView('report');
                loadReport(item.report_date);
            });
            container.appendChild(div);
        });

        listOffset += (data.items || []).length;
        listHasMore = data.has_more;
        document.getElementById('btn-load-more').classList.toggle('d-none', !listHasMore);
    } catch (e) {
        console.error('load report list error:', e);
    }
}

// ── Main load + navigation ───────────────────────────────────────────────────
async function loadReport(dateStr) {
    const url = dateStr ? `/api/news/report/${dateStr}` : '/api/news/latest';
    try {
        const report = await apiFetch(url);
        renderReport(report);
    } catch(e) {
        console.error('load report error:', e);
        document.getElementById('empty-state').classList.remove('d-none');
        document.getElementById('summary-card').classList.add('d-none');
        document.getElementById('indicators-row').classList.add('d-none');
        document.getElementById('news-sections').innerHTML = '';
        document.getElementById('report-date').textContent = '—';
    }
}

function renderReport(report) {
    // Hide empty state
    document.getElementById('empty-state').classList.add('d-none');

    // Header date + time
    let dateTimeStr = report.report_date || '—';
    if (report.created_at) {
        const d = new Date(report.created_at);
        const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        dateTimeStr = `${report.report_date} ${timeStr}`;
    }
    document.getElementById('report-date').textContent = dateTimeStr;
    document.title = `모닝 리포트 ${dateTimeStr} — My Portfolio`;

    // Summary card
    const summaryCard = document.getElementById('summary-card');
    summaryCard.classList.remove('d-none');
    document.getElementById('summary-text').textContent = report.summary || '';
    document.getElementById('total-collected').textContent = report.total_collected ?? '—';
    document.getElementById('total-selected').textContent = report.total_selected ?? '—';
    document.getElementById('model-used').textContent = report.model_used || '—';
    if (report.created_at) {
        const d = new Date(report.created_at);
        document.getElementById('created-at').textContent =
            `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    } else {
        document.getElementById('created-at').textContent = '—';
    }

    // Market indicators
    renderMarketIndicators(report.market_indicators);

    // Group items by category
    const groups = {};
    (report.items || []).forEach(item => {
        const cat = item.category || 'macro';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(item);
    });

    // Render sections in order
    const order = ['macro', 'stock', 'crypto', 'sentiment', 'hiring'];
    const sectionsEl = document.getElementById('news-sections');
    sectionsEl.innerHTML = '';
    order.forEach(catKey => {
        if (groups[catKey] && groups[catKey].length) {
            sectionsEl.innerHTML += renderSection(catKey, groups[catKey]);
        }
    });
}

async function loadReportsList() {
    try {
        const data = await apiFetch('/api/news/reports?offset=0&limit=100');
        reportsList = data.items || data;
    } catch(e) {
        console.error('load reports list error:', e);
        reportsList = [];
    }
    updateNavButtons();
}

function updateNavButtons() {
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');

    if (!reportsList.length) {
        btnPrev.disabled = true;
        btnNext.disabled = true;
        return;
    }

    // Find current index from the displayed date
    const currentDate = document.getElementById('report-date').textContent;
    currentReportIndex = reportsList.findIndex(r => r.report_date === currentDate);

    // reportsList is assumed newest-first
    btnNext.disabled = currentReportIndex <= 0;
    btnPrev.disabled = currentReportIndex < 0 || currentReportIndex >= reportsList.length - 1;
}

function navigatePrev() {
    if (currentReportIndex < 0 || currentReportIndex >= reportsList.length - 1) return;
    const prevReport = reportsList[currentReportIndex + 1];
    loadReport(prevReport.report_date).then(updateNavButtons);
}

function navigateNext() {
    if (currentReportIndex <= 0) return;
    const nextReport = reportsList[currentReportIndex - 1];
    loadReport(nextReport.report_date).then(updateNavButtons);
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    document.getElementById('btn-prev').addEventListener('click', navigatePrev);
    document.getElementById('btn-next').addEventListener('click', navigateNext);
    document.getElementById('btn-view-report').addEventListener('click', () => switchView('report'));
    document.getElementById('btn-view-list').addEventListener('click', () => switchView('list'));
    document.getElementById('btn-load-more').addEventListener('click', loadReportList);

    // 생성 중이면 로딩 건너뛰고 바로 생성 중 상태 표시
    const genStarted = localStorage.getItem('news_generating');
    const isGenerating = genStarted && (Date.now() - parseInt(genStarted)) < 180000;

    if (isGenerating) {
        await loadSidebarAssets();
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        showGeneratingState();
        // 5초마다 리포트 완료 여부 폴링
        const pollId = setInterval(async () => {
            try {
                const headers = getAuthHeaders();
                if (!headers) return;
                const res = await fetch('/api/news/latest', { headers });
                if (res.ok) {
                    clearInterval(pollId);
                    localStorage.removeItem('news_generating');
                    document.getElementById('empty-state').classList.add('d-none');
                    loadReport();
                    loadReportsList();
                }
            } catch(e) { /* 계속 폴링 */ }
        }, 5000);
    } else {
        if (genStarted) localStorage.removeItem('news_generating');
        await Promise.all([
            loadReport(),
            loadReportsList(),
            loadSidebarAssets(),
        ]);
        updateNavButtons();
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }
});
</script>
