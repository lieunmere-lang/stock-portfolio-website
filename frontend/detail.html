<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코인 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --color-up: #16a34a;
            --color-down: #dc2626;
            --color-neutral: #6b7280;
            --bg-main: #f1f5f9;
            --card-radius: 0.875rem;
        }
        body { background: var(--bg-main); font-family: 'Inter', sans-serif; color: #1e293b; }
        .navbar { box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .section-card {
            border: none; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .section-title {
            font-size: .8rem; font-weight: 600; letter-spacing: .06em;
            text-transform: uppercase; color: #64748b; margin-bottom: 1rem;
        }
        .text-up   { color: var(--color-up) !important; }
        .text-down { color: var(--color-down) !important; }
        .text-neutral { color: var(--color-neutral) !important; }
        .stat-label {
            font-size: .72rem; font-weight: 600; color: #94a3b8;
            text-transform: uppercase; letter-spacing: .05em; margin-bottom: .25rem;
        }
        .stat-value { font-size: 1rem; font-weight: 600; }
        .stat-cell { padding: 1rem; border-radius: .5rem; background: #f8fafc; }
        .price-big { font-size: 1.75rem; font-weight: 700; }
        .badge-change {
            display: inline-flex; align-items: center; gap: .25rem;
            padding: .25rem .6rem; border-radius: 99px;
            font-size: .8rem; font-weight: 600;
        }
        .badge-up   { background: rgba(22,163,74,.12);  color: var(--color-up); }
        .badge-down { background: rgba(220,38,38,.12); color: var(--color-down); }
        .chart-wrap { height: 220px; }
        .period-btn-group .btn { font-size: .78rem; }
        .coin-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: contain; }
        .coin-logo-placeholder {
            width: 40px; height: 40px; border-radius: 50%;
            background: #e2e8f0; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: .85rem; color: #64748b;
        }
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg-main); z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }

        /* === Sidebar navigation === */
        html { scroll-behavior: smooth; }
        @media (min-width: 992px) {
            #sidebar {
                position: fixed; top: 0; left: 0;
                width: 240px; height: 100vh;
                border-right: 1px solid #e2e8f0;
                background: #fff;
                display: flex; flex-direction: column;
                z-index: 20;
            }
            /* index.html also lists > #error-banner here; detail.html's
               error banner is nested inside #main-content, so its margin
               is already covered by the #main-content selector above. */
            body.has-sidebar > nav.navbar,
            body.has-sidebar > #main-content,
            body.has-sidebar > #loading-overlay { margin-left: 240px; }
        }
        .sidebar-link {
            display: flex; align-items: center; gap: .6rem;
            padding: .55rem 1rem;
            color: #475569; text-decoration: none;
            font-size: .88rem;
            border-left: 3px solid transparent;
        }
        .sidebar-link:hover:not(.disabled) { background: #f8fafc; color: #0f172a; }
        .sidebar-link.active {
            background: #eff6ff; color: #1d4ed8;
            border-left-color: #1d4ed8; font-weight: 600;
        }
        .sidebar-link.disabled { color: #cbd5e1; cursor: not-allowed; }
        .sidebar-group-label {
            font-size: .7rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: .08em;
            padding: 1rem 1rem .4rem;
        }
        .sidebar-footer {
            padding: 1rem; border-top: 1px solid #e2e8f0;
            margin-top: auto;
        }
        .sidebar-link .badge { margin-left: auto; }
        .sidebar-stock {
            display: flex; align-items: center; gap: .5rem;
            padding: .4rem 1rem .4rem 1.8rem;
            color: #64748b; text-decoration: none;
            font-size: .8rem;
            border-left: 3px solid transparent;
            transition: background .15s;
        }
        .sidebar-stock:hover { background: #f8fafc; color: #0f172a; }
        .sidebar-stock.active { background: #eff6ff; color: #1d4ed8; border-left-color: #1d4ed8; font-weight: 600; }
        .sidebar-stock .stock-ticker { font-weight: 600; color: #334155; min-width: 3rem; }
        .sidebar-stock.active .stock-ticker { color: #1d4ed8; }
        .sidebar-stock .stock-name { color: #94a3b8; font-size: .72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-stock .stock-pnl { margin-left: auto; font-size: .72rem; font-weight: 600; }
    </style>
</head>
<body class="has-sidebar">

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
    <div class="text-center text-muted">
        <div class="spinner-border spinner-border-sm mb-2"></div>
        <div style="font-size:.85rem;">불러오는 중...</div>
    </div>
</div>

<!-- Sidebar navigation -->
<aside id="sidebar" class="offcanvas-lg offcanvas-start" tabindex="-1" aria-labelledby="sidebar-label">
    <div class="offcanvas-header border-bottom">
        <span id="sidebar-label" class="fw-bold">
            <i class="bi bi-bar-chart-line-fill text-primary"></i> My Portfolio
        </span>
        <button type="button" class="btn-close d-lg-none"
                data-bs-dismiss="offcanvas" data-bs-target="#sidebar" aria-label="Close"></button>
    </div>
    <nav class="offcanvas-body d-flex flex-column p-0">
        <a href="/" class="sidebar-link"><i class="bi bi-speedometer2 me-2"></i>대시보드</a>

        <div class="sidebar-group-label">개인종목</div>
        <div id="sidebar-assets"></div>

        <div class="sidebar-group-label">분석</div>
        <a href="/news.html" class="sidebar-link"><i class="bi bi-newspaper me-2"></i>뉴스 리포트</a>
        <a href="/market.html" class="sidebar-link"><i class="bi bi-globe me-2"></i>시장 상황판</a>

        <div class="sidebar-group-label">도구</div>
        <span class="sidebar-link disabled">가격 알림 <span class="badge text-bg-light">준비중</span></span>
        <span class="sidebar-link disabled">리밸런싱 <span class="badge text-bg-light">준비중</span></span>
        <span class="sidebar-link disabled">트레이드 저널 <span class="badge text-bg-light">준비중</span></span>
        <span class="sidebar-link disabled">수익 실현 계산기 <span class="badge text-bg-light">준비중</span></span>

        <div class="sidebar-group-label">기타</div>
        <span class="sidebar-link disabled">설정 <span class="badge text-bg-light">준비중</span></span>

        <div class="sidebar-footer">
            <button onclick="logout()" class="btn btn-sm btn-outline-secondary w-100">
                <i class="bi bi-box-arrow-right"></i> 로그아웃
            </button>
        </div>
    </nav>
</aside>

<!-- Mobile navbar (only visible <992px) -->
<nav class="navbar navbar-light bg-white border-bottom px-3 py-2 d-lg-none">
    <button class="btn btn-sm" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#sidebar"
            aria-controls="sidebar" aria-label="메뉴 열기">
        <i class="bi bi-list fs-4"></i>
    </button>
    <span id="nav-title" class="fw-semibold fs-6">—</span>
    <span style="width:32px"></span>
</nav>

<div id="main-content" class="container-xl py-4" style="display:none;">

    <!-- 오류 배너 -->
    <div id="error-banner" class="alert alert-danger d-none mb-3" style="font-size:.85rem;"></div>

    <!-- 코인 헤더 -->
    <div class="section-card bg-white p-4 mb-3">
        <div class="d-flex align-items-center gap-3 mb-3">
            <div id="coin-logo-wrap"></div>
            <div>
                <div class="d-flex align-items-baseline gap-2">
                    <span id="coin-name" class="fw-bold fs-5">—</span>
                    <span id="coin-symbol" class="text-muted" style="font-size:.85rem;">—</span>
                </div>
                <span id="market-cap-rank" class="badge bg-light text-secondary" style="font-size:.72rem;"></span>
            </div>
        </div>
        <div class="d-flex align-items-center gap-3 flex-wrap">
            <span id="current-price" class="price-big">—</span>
            <span id="change-24h-badge" class="badge-change">—</span>
            <span class="text-muted" style="font-size:.78rem;">24시간 변동</span>
        </div>
        <!-- 기간별 수익률 뱃지 -->
        <div class="d-flex gap-2 mt-3 flex-wrap" id="period-changes"></div>
    </div>

    <div class="row g-3">
        <!-- 내 보유 현황 -->
        <div class="col-12 col-lg-5">
            <div class="section-card bg-white p-4 h-100">
                <div class="section-title">내 보유 현황</div>
                <div id="holding-section">
                    <div class="text-muted text-center py-4" style="font-size:.85rem;">보유 종목 아님</div>
                </div>
            </div>
        </div>

        <!-- 시장 데이터 -->
        <div class="col-12 col-lg-7">
            <div class="section-card bg-white p-4 h-100">
                <div class="section-title">시장 데이터</div>
                <div class="row g-2" id="market-grid"></div>
            </div>
        </div>
    </div>

    <!-- 가격 차트 -->
    <div class="section-card bg-white p-4 mt-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="section-title mb-0">가격 차트</div>
            <div class="btn-group btn-group-sm period-btn-group" id="chart-period-btns">
                <button class="btn btn-outline-secondary active" data-days="30">1개월</button>
                <button class="btn btn-outline-secondary" data-days="90">3개월</button>
                <button class="btn btn-outline-secondary" data-days="180">6개월</button>
                <button class="btn btn-outline-secondary" data-days="365">1년</button>
            </div>
        </div>
        <div class="chart-wrap">
            <canvas id="price-chart"></canvas>
        </div>
    </div>

    <!-- 링크 -->
    <div id="links-section" class="section-card bg-white p-4 mt-3 d-none">
        <div class="section-title">링크</div>
        <div class="d-flex gap-2 flex-wrap" id="links-wrap"></div>
    </div>

</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('portfolio_token'); }
function getAuthHeaders() {
    const t = getToken();
    if (!t) { window.location.href = '/login.html'; return null; }
    return { 'Authorization': `Bearer ${t}`, 'Content-Type': 'application/json' };
}
function logout() { localStorage.removeItem('portfolio_token'); window.location.href = '/login.html'; }

async function apiFetch(url) {
    const headers = getAuthHeaders();
    if (!headers) throw new Error('Unauthenticated');
    const res = await fetch(url, { headers });
    if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
}

// ── Formatters ────────────────────────────────────────────────────────────────
const KRW = v => v == null ? '—' : new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW', maximumFractionDigits: 0 }).format(v);
const PCT  = (v, d=2) => v == null ? '—' : `${v >= 0 ? '+' : ''}${v.toFixed(d)}%`;
const NUM  = (v, d=2) => v == null ? '—' : v.toLocaleString('ko-KR', { maximumFractionDigits: d });
const SUPPLY = v => {
    if (v == null) return '—';
    if (v >= 1e9) return `${(v/1e9).toFixed(2)}B`;
    if (v >= 1e6) return `${(v/1e6).toFixed(2)}M`;
    return NUM(v, 0);
};
function pnlClass(v) { return v == null ? '' : v >= 0 ? 'text-up' : 'text-down'; }

// ── State ──────────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const ticker = params.get('ticker') || '';
const assetType = params.get('type') || 'coin';
let priceChart = null;
let currentDays = 30;

// ── Render functions ──────────────────────────────────────────────────────────
function renderHeader(detail) {
    // 로고
    const wrap = document.getElementById('coin-logo-wrap');
    if (detail.image) {
        wrap.innerHTML = `<img src="${detail.image}" class="coin-logo" alt="${detail.symbol}">`;
    } else {
        wrap.innerHTML = `<div class="coin-logo-placeholder">${detail.symbol?.slice(0,3) ?? '?'}</div>`;
    }

    document.getElementById('coin-name').textContent = detail.name ?? '—';
    document.getElementById('coin-symbol').textContent = detail.symbol ?? '';
    document.getElementById('nav-title').textContent = detail.name ?? ticker;
    document.title = `${detail.name ?? ticker} — My Portfolio`;

    if (detail.market_cap_rank) {
        document.getElementById('market-cap-rank').textContent = `#${detail.market_cap_rank}`;
    }

    document.getElementById('current-price').textContent = KRW(detail.current_price_krw);

    const pct24 = detail.price_change_24h_pct;
    const badge = document.getElementById('change-24h-badge');
    badge.textContent = PCT(pct24);
    badge.className = `badge-change ${pct24 != null && pct24 >= 0 ? 'badge-up' : 'badge-down'}`;

    // 기간별 수익률
    const periods = [
        { label: '7일', val: detail.price_change_7d_pct },
        { label: '30일', val: detail.price_change_30d_pct },
        { label: '1년', val: detail.price_change_1y_pct },
    ];
    const periodWrap = document.getElementById('period-changes');
    periods.forEach(p => {
        if (p.val == null) return;
        const isUp = p.val >= 0;
        const span = document.createElement('span');
        span.className = `badge-change ${isUp ? 'badge-up' : 'badge-down'}`;
        span.textContent = `${p.label}  ${PCT(p.val)}`;
        periodWrap.appendChild(span);
    });
}

function renderHolding(asset, totalPortfolio) {
    if (!asset) return;
    const el = document.getElementById('holding-section');
    const weight = totalPortfolio > 0 ? (asset.total_value / totalPortfolio * 100) : 0;
    const holdDays = asset.first_purchase_date
        ? Math.floor((Date.now() - new Date(asset.first_purchase_date)) / 86400000)
        : null;
    const holdText = holdDays != null
        ? holdDays >= 30 ? `${Math.floor(holdDays/30)}개월 ${holdDays % 30}일` : `${holdDays}일`
        : '—';

    const stats = [
        { label: '평가금액',  value: KRW(asset.total_value),          full: true },
        { label: '손익',      value: KRW(asset.profit_loss),          cls: pnlClass(asset.profit_loss) },
        { label: '수익률',    value: PCT(asset.profit_loss_rate),      cls: pnlClass(asset.profit_loss_rate) },
        { label: '수량',      value: NUM(asset.quantity, 6) },
        { label: '평균 매수가', value: KRW(asset.avg_price) },
        { label: '보유기간',  value: holdText },
        { label: '비중',      value: `${weight.toFixed(1)}%` },
        { label: '투자금액',  value: KRW(asset.quantity * asset.avg_price) },
    ];

    el.innerHTML = `<div class="row g-2">` +
        stats.map(s => `
            <div class="col-${s.full ? '12' : '6'}">
                <div class="stat-cell">
                    <div class="stat-label">${s.label}</div>
                    <div class="stat-value ${s.cls || ''}">${s.value}</div>
                </div>
            </div>`).join('') +
        `</div>`;
}

function renderMarketGrid(detail) {
    const items = [
        { label: '시가총액',    value: KRW(detail.market_cap_krw) },
        { label: '24h 거래량',  value: KRW(detail.volume_24h_krw) },
        { label: '24h 고가',    value: KRW(detail.high_24h_krw) },
        { label: '24h 저가',    value: KRW(detail.low_24h_krw) },
        { label: '52주 고가',   value: detail.high_52w_krw ? KRW(detail.high_52w_krw) : KRW(detail.ath_krw) + ' (ATH)' },
        { label: '52주 저가',   value: detail.low_52w_krw  ? KRW(detail.low_52w_krw)  : '—' },
        { label: '유통 공급량', value: SUPPLY(detail.circulating_supply) },
        { label: '전체 공급량', value: detail.total_supply ? SUPPLY(detail.total_supply) : '무제한' },
        { label: '도미넌스',    value: detail.dominance_pct != null ? `${detail.dominance_pct.toFixed(2)}%` : '—' },
        { label: '최고가(ATH)', value: KRW(detail.ath_krw) },
    ];

    document.getElementById('market-grid').innerHTML =
        items.map(i => `
            <div class="col-6 col-md-4 col-lg-6 col-xl-4">
                <div class="stat-cell">
                    <div class="stat-label">${i.label}</div>
                    <div class="stat-value">${i.value}</div>
                </div>
            </div>`).join('');
}

function renderLinks(detail) {
    const links = [];
    if (detail.homepage) {
        links.push({ href: detail.homepage, icon: 'bi-globe', label: '공식 사이트' });
    }
    if (detail.whitepaper) {
        links.push({ href: detail.whitepaper, icon: 'bi-file-earmark-text', label: '백서' });
    }
    if (!links.length) return;

    document.getElementById('links-section').classList.remove('d-none');
    document.getElementById('links-wrap').innerHTML = links.map(l =>
        `<a href="${l.href}" target="_blank" rel="noopener"
            class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1">
            <i class="bi ${l.icon}"></i> ${l.label}
         </a>`
    ).join('');
}

// ── Stock render functions ───────────────────────────────────────────────────
const USD = v => v == null ? '—' : `$${v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

function renderStockHeader(detail) {
    const wrap = document.getElementById('coin-logo-wrap');
    if (detail.logo_url) {
        wrap.innerHTML = `<img src="${detail.logo_url}" class="coin-logo" alt="${detail.symbol}">`;
    } else {
        wrap.innerHTML = `<div class="coin-logo-placeholder">${(detail.symbol || '?').slice(0,3)}</div>`;
    }

    document.getElementById('coin-name').textContent = detail.name ?? '—';
    document.getElementById('coin-symbol').textContent = detail.symbol ?? '';
    document.getElementById('nav-title').textContent = detail.name ?? ticker;
    document.title = `${detail.name ?? ticker} — My Portfolio`;

    document.getElementById('current-price').textContent = USD(detail.current_price);

    const pct = detail.price_change_pct;
    const badge = document.getElementById('change-24h-badge');
    badge.textContent = PCT(pct);
    badge.className = `badge-change ${pct != null && pct >= 0 ? 'badge-up' : 'badge-down'}`;

    const periodWrap = document.getElementById('period-changes');
    periodWrap.innerHTML = '';
    if (detail.post_market_price) {
        const span = document.createElement('span');
        span.className = 'badge-change';
        span.style.background = 'rgba(100,116,139,.1)';
        span.style.color = '#64748b';
        span.textContent = `시간외 ${USD(detail.post_market_price)}`;
        periodWrap.appendChild(span);
    }
    if (detail.current_price_krw) {
        const span = document.createElement('span');
        span.className = 'badge-change';
        span.style.background = 'rgba(100,116,139,.1)';
        span.style.color = '#64748b';
        span.textContent = `≈ ${KRW(detail.current_price_krw)}`;
        periodWrap.appendChild(span);
    }
}

function renderStockMarketGrid(detail) {
    const BIGNUM = v => {
        if (v == null) return '—';
        if (v >= 1e12) return `$${(v/1e12).toFixed(2)}T`;
        if (v >= 1e9) return `$${(v/1e9).toFixed(2)}B`;
        if (v >= 1e6) return `$${(v/1e6).toFixed(2)}M`;
        return `$${v.toLocaleString()}`;
    };
    const PCTFMT = v => v == null ? '—' : `${(v * 100).toFixed(2)}%`;
    const RATIO = v => v == null ? '—' : v.toFixed(2);

    const rangeBar = (low, high, current) => {
        if (low == null || high == null || current == null) return '';
        const pct = high > low ? ((current - low) / (high - low) * 100) : 50;
        return `<div style="height:6px;border-radius:3px;background:#e2e8f0;margin-top:4px;position:relative;">
            <div style="height:100%;border-radius:3px;background:linear-gradient(90deg,#dc2626,#f59e0b,#16a34a);width:100%;opacity:.3;"></div>
            <div style="position:absolute;top:-2px;left:${Math.min(Math.max(pct,2),98)}%;width:10px;height:10px;border-radius:50%;background:#1e293b;transform:translateX(-50%);"></div>
        </div>`;
    };

    const sections = [
        { title: '밸류에이션', items: [
            { label: 'PER (TTM)', value: RATIO(detail.trailing_pe) },
            { label: 'Forward PER', value: RATIO(detail.forward_pe) },
            { label: 'PBR', value: RATIO(detail.price_to_book) },
            { label: 'PSR', value: RATIO(detail.price_to_sales) },
            { label: 'EV/EBITDA', value: RATIO(detail.ev_to_ebitda) },
        ]},
        { title: '수익성 / 배당', items: [
            { label: 'ROE', value: PCTFMT(detail.roe) },
            { label: 'ROA', value: PCTFMT(detail.roa) },
            { label: '배당수익률', value: PCTFMT(detail.dividend_yield) },
            { label: '연간 배당금', value: USD(detail.dividend_rate) },
            { label: '배당일', value: detail.ex_dividend_date ?? '—' },
        ]},
        { title: '시장 데이터', items: [
            { label: '시가총액', value: BIGNUM(detail.market_cap) },
            { label: '거래량', value: detail.volume ? detail.volume.toLocaleString() : '—' },
            { label: '평균 거래량', value: detail.average_volume ? detail.average_volume.toLocaleString() : '—' },
            { label: 'Day Range', value: `${USD(detail.day_low)} — ${USD(detail.day_high)}`, extra: rangeBar(detail.day_low, detail.day_high, detail.current_price) },
            { label: '52주 Range', value: `${USD(detail.fifty_two_week_low)} — ${USD(detail.fifty_two_week_high)}`, extra: rangeBar(detail.fifty_two_week_low, detail.fifty_two_week_high, detail.current_price) },
        ]},
        { title: '애널리스트 컨센서스', items: [
            { label: '추천', value: (detail.recommendation_key ?? '—').toUpperCase() },
            { label: '목표가 (평균)', value: USD(detail.target_mean_price) },
            { label: '목표가 범위', value: `${USD(detail.target_low_price)} — ${USD(detail.target_high_price)}` },
            { label: '애널리스트 수', value: detail.number_of_analysts ?? '—' },
        ]},
    ];

    const grid = document.getElementById('market-grid');
    grid.innerHTML = '';
    grid.className = '';

    sections.forEach(sec => {
        const sectionEl = document.createElement('div');
        sectionEl.className = 'mb-4';
        sectionEl.innerHTML = `<div class="section-title">${sec.title}</div>
            <div class="row g-2">${sec.items.map(i => `
                <div class="col-6 col-md-4 col-lg-6 col-xl-4">
                    <div class="stat-cell">
                        <div class="stat-label">${i.label}</div>
                        <div class="stat-value">${i.value}</div>
                        ${i.extra || ''}
                    </div>
                </div>`).join('')}
            </div>`;
        grid.appendChild(sectionEl);
    });
}

async function renderStockPriceChart(days) {
    try {
        const data = await apiFetch(`/api/stock/${encodeURIComponent(ticker)}/price-history?days=${days}`);
        if (!data.timestamps?.length) return;

        const axisFormat = days <= 90
            ? d => `${d.getMonth()+1}/${d.getDate()}`
            : d => `${d.getFullYear()}/${d.getMonth()+1}`;

        const labels = data.timestamps.map(t => {
            const [y, m, d] = t.split('-').map(Number);
            return axisFormat(new Date(y, m-1, d));
        });

        const firstPrice = data.prices[0] || 1;
        const lastPrice  = data.prices[data.prices.length - 1] ?? firstPrice;
        const isUp = lastPrice >= firstPrice;
        const lineColor = isUp ? '#16a34a' : '#dc2626';
        const bgColor   = isUp ? 'rgba(22,163,74,.08)' : 'rgba(220,38,38,.08)';

        const tooltipCb = {
            title: ctx => data.timestamps[ctx[0].dataIndex],
            label: ctx => ` $${ctx.parsed.y.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}`,
        };
        const yTickCb = v => {
            if (v >= 1e6) return `$${(v/1e6).toFixed(0)}M`;
            if (v >= 1e3) return `$${(v/1e3).toFixed(0)}K`;
            return `$${v}`;
        };

        if (!priceChart) {
            priceChart = new Chart(document.getElementById('price-chart'), {
                type: 'line',
                data: { labels, datasets: [{
                    data: data.prices, borderColor: lineColor, backgroundColor: bgColor,
                    fill: true, tension: 0.3, pointRadius: 0, pointHoverRadius: 4, borderWidth: 2,
                }]},
                options: {
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: false }, tooltip: { callbacks: tooltipCb } },
                    scales: {
                        x: { ticks: { maxTicksLimit: days <= 90 ? 10 : 8, font: { size: 10 }, maxRotation: 0 }, grid: { display: false } },
                        y: { ticks: { callback: yTickCb, font: { size: 10 } }, grid: { color: '#f1f5f9' } },
                    },
                    maintainAspectRatio: false,
                }
            });
        } else {
            priceChart.options.scales.x.ticks.maxTicksLimit = days <= 90 ? 10 : 8;
            priceChart.data.labels = labels;
            priceChart.data.datasets[0].data = data.prices;
            priceChart.data.datasets[0].borderColor = lineColor;
            priceChart.data.datasets[0].backgroundColor = bgColor;
            priceChart.options.plugins.tooltip.callbacks = tooltipCb;
            priceChart.options.scales.y.ticks.callback = yTickCb;
            priceChart.update();
        }
    } catch(e) {
        console.error('stock price chart error:', e);
    }
}

async function renderPriceChart(days) {
    try {
        const data = await apiFetch(`/api/coin/${encodeURIComponent(ticker)}/price-history?days=${days}`);
        if (!data.timestamps?.length) return;

        const axisFormat = days <= 30
            ? d => `${d.getMonth()+1}/${d.getDate()}`
            : days <= 90
                ? d => `${d.getMonth()+1}/${d.getDate()}`
                : d => `${d.getFullYear()}/${d.getMonth()+1}`;

        const labels = data.timestamps.map(t => {
            const [y, m, d] = t.split('-').map(Number);
            return axisFormat(new Date(y, m-1, d));
        });

        const firstPrice = data.prices[0] || 1;
        const lastPrice  = data.prices[data.prices.length - 1] ?? firstPrice;
        const isUp = lastPrice >= firstPrice;
        const lineColor = isUp ? '#16a34a' : '#dc2626';
        const bgColor   = isUp ? 'rgba(22,163,74,.08)' : 'rgba(220,38,38,.08)';

        if (!priceChart) {
            priceChart = new Chart(document.getElementById('price-chart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        data: data.prices,
                        borderColor: lineColor,
                        backgroundColor: bgColor,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        borderWidth: 2,
                    }]
                },
                options: {
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: ctx => data.timestamps[ctx[0].dataIndex],
                                label: ctx => ` ${KRW(ctx.parsed.y)}`,
                            }
                        },
                    },
                    scales: {
                        x: {
                            ticks: { maxTicksLimit: days <= 90 ? 10 : 8, font: { size: 10 }, maxRotation: 0 },
                            grid: { display: false },
                        },
                        y: {
                            ticks: {
                                callback: v => {
                                    if (v >= 1e8) return `${(v/1e8).toFixed(0)}억`;
                                    if (v >= 1e4) return `${(v/1e4).toFixed(0)}만`;
                                    return v.toLocaleString();
                                },
                                font: { size: 10 },
                            },
                            grid: { color: '#f1f5f9' },
                        },
                    },
                    maintainAspectRatio: false,
                }
            });
        } else {
            const maxTicks = days <= 90 ? 10 : 8;
            priceChart.options.scales.x.ticks.maxTicksLimit = maxTicks;
            priceChart.data.labels = labels;
            priceChart.data.datasets[0].data = data.prices;
            priceChart.data.datasets[0].borderColor = lineColor;
            priceChart.data.datasets[0].backgroundColor = bgColor;
            priceChart.update();
        }
    } catch(e) {
        console.error('price chart error:', e);
    }
}

// ── Sidebar asset list ────────────────────────────────────────────────────────
function renderSidebarAssets(assets) {
    const wrap = document.getElementById('sidebar-assets');
    const filtered = assets.filter(a => (a.quantity * a.avg_price) >= 10000);
    if (!filtered.length) { wrap.innerHTML = ''; return; }
    wrap.innerHTML = filtered.map(a => {
        const type = a.asset_type === 'stock' ? 'stock' : 'coin';
        const active = a.ticker === ticker ? ' active' : '';
        const plr = a.profit_loss_rate;
        const cls = plr >= 0 ? 'text-up' : 'text-down';
        const sign = plr >= 0 ? '+' : '';
        const label = a.asset_type === 'stock' ? a.ticker : a.ticker.replace('KRW-', '');
        return `<a href="/detail.html?type=${type}&ticker=${encodeURIComponent(a.ticker)}" class="sidebar-stock${active}">
            <span class="stock-ticker">${label}</span>
            <span class="stock-name">${a.name}</span>
            <span class="stock-pnl ${cls}">${sign}${(plr * 100).toFixed(1)}%</span>
        </a>`;
    }).join('');
}

// ── Main ──────────────────────────────────────────────────────────────────────
async function loadDetail() {
    if (!ticker) { window.location.href = '/'; return; }

    try {
        if (assetType === 'stock') {
            const [detail, portfolio] = await Promise.all([
                apiFetch(`/api/stock/${encodeURIComponent(ticker)}`),
                apiFetch('/api/portfolio'),
            ]);

            renderStockHeader(detail);
            renderStockMarketGrid(detail);

            if (detail.website) {
                document.getElementById('links-section').classList.remove('d-none');
                document.getElementById('links-wrap').innerHTML =
                    `<a href="${detail.website}" target="_blank" rel="noopener"
                        class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1">
                        <i class="bi bi-globe"></i> 공식 사이트
                     </a>`;
            }

            renderSidebarAssets(portfolio.assets || []);
            const myAsset = (portfolio.assets || []).find(a => a.ticker === ticker);
            renderHolding(myAsset, portfolio.total_value);

            await renderStockPriceChart(currentDays);
        } else {
            const [detail, portfolio] = await Promise.all([
                apiFetch(`/api/coin/${encodeURIComponent(ticker)}`),
                apiFetch('/api/portfolio'),
            ]);

            renderHeader(detail);
            renderMarketGrid(detail);
            renderLinks(detail);

            renderSidebarAssets(portfolio.assets || []);
            const myAsset = (portfolio.assets || []).find(a => a.ticker === ticker);
            renderHolding(myAsset, portfolio.total_value);

            await renderPriceChart(currentDays);
        }

        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = '';
    } catch(e) {
        if (e.message === 'Unauthenticated' || e.message === 'Unauthorized') return;
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = '';
        const banner = document.getElementById('error-banner');
        banner.textContent = '데이터 로딩 실패: ' + e.message;
        banner.classList.remove('d-none');
    }
}

// 차트 기간 버튼
document.getElementById('chart-period-btns').addEventListener('click', async e => {
    const btn = e.target.closest('button[data-days]');
    if (!btn) return;
    document.querySelectorAll('#chart-period-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDays = +btn.dataset.days;
    if (assetType === 'stock') {
        await renderStockPriceChart(currentDays);
    } else {
        await renderPriceChart(currentDays);
    }
});

document.addEventListener('DOMContentLoaded', loadDetail);

// ── Sidebar offcanvas auto-close (detail page, no scroll-spy) ─────────────────
(function initSidebarDetail() {
    const sidebarEl = document.getElementById('sidebar');
    document.querySelectorAll('#sidebar .sidebar-link:not(.disabled)').forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth < 992 && sidebarEl) {
                const inst = bootstrap.Offcanvas.getInstance(sidebarEl)
                           || bootstrap.Offcanvas.getOrCreateInstance(sidebarEl);
                inst.hide();
            }
        });
    });
})();
