<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시장 상황판 — My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --color-up: #16a34a;
            --color-down: #dc2626;
            --color-neutral: #6b7280;
            --bg-main: #f1f5f9;
            --card-radius: 0.875rem;
        }
        body { background: var(--bg-main); font-family: 'Inter', sans-serif; color: #1e293b; }
        .navbar { box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .section-card {
            border: none; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .section-title {
            font-size: .8rem; font-weight: 600; letter-spacing: .06em;
            text-transform: uppercase; color: #64748b; margin-bottom: 1rem;
        }
        .text-up   { color: var(--color-up) !important; }
        .text-down { color: var(--color-down) !important; }
        .text-neutral { color: var(--color-neutral) !important; }
        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg-main); z-index: 100;
            display: flex; align-items: center; justify-content: center;
        }

        /* === Sidebar navigation === */
        html { scroll-behavior: smooth; }
        @media (min-width: 992px) {
            #sidebar {
                position: fixed; top: 0; left: 0;
                width: 240px; height: 100vh;
                border-right: 1px solid #e2e8f0;
                background: #fff;
                display: flex; flex-direction: column;
                z-index: 20;
            }
            body.has-sidebar > nav.navbar,
            body.has-sidebar > #main-content,
            body.has-sidebar > #loading-overlay { margin-left: 240px; }
        }
        .sidebar-link {
            display: flex; align-items: center; gap: .6rem;
            padding: .55rem 1rem;
            color: #475569; text-decoration: none;
            font-size: .88rem;
            border-left: 3px solid transparent;
        }
        .sidebar-link:hover:not(.disabled) { background: #f8fafc; color: #0f172a; }
        .sidebar-link.active {
            background: #eff6ff; color: #1d4ed8;
            border-left-color: #1d4ed8; font-weight: 600;
        }
        .sidebar-link.disabled { color: #cbd5e1; cursor: not-allowed; }
        .sidebar-group-label {
            font-size: .7rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: .08em;
            padding: 1rem 1rem .4rem;
        }
        .sidebar-footer {
            padding: 1rem; border-top: 1px solid #e2e8f0;
            margin-top: auto;
        }
        .sidebar-link .badge { margin-left: auto; }
        .sidebar-stock {
            display: flex; align-items: center; gap: .5rem;
            padding: .4rem 1rem .4rem 1.8rem;
            color: #64748b; text-decoration: none;
            font-size: .8rem;
            border-left: 3px solid transparent;
            transition: background .15s;
        }
        .sidebar-stock:hover { background: #f8fafc; color: #0f172a; }
        .sidebar-stock.active { background: #eff6ff; color: #1d4ed8; border-left-color: #1d4ed8; font-weight: 600; }
        .sidebar-stock .stock-ticker { font-weight: 600; color: #334155; min-width: 3rem; }
        .sidebar-stock.active .stock-ticker { color: #1d4ed8; }
        .sidebar-stock .stock-name { color: #94a3b8; font-size: .72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sidebar-stock .stock-pnl { margin-left: auto; font-size: .72rem; font-weight: 600; }

        /* === Market page specific === */
        .period-tab-btn {
            font-size: .85rem; padding: .3rem .75rem;
            border: 1px solid #e2e8f0;
            background: #fff; color: #475569;
            border-radius: 6px; cursor: pointer;
            transition: background .15s, color .15s;
        }
        .period-tab-btn:hover { background: #f8fafc; }
        .period-tab-btn.active {
            background: #1d4ed8; color: #fff; border-color: #1d4ed8; font-weight: 600;
        }
        .period-tabs { display: flex; gap: .4rem; }

        /* === Heatmap === */
        #heatmap-container {
            background: #1a1a2e;
            border-radius: var(--card-radius);
            height: 500px;
            position: relative;
            overflow: hidden;
        }
        #heatmap-svg { width: 100%; height: 100%; }
        #heatmap-loading {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8;
        }
        #heatmap-error {
            position: absolute; inset: 0;
            display: none; align-items: center; justify-content: center;
            color: #ef4444; font-size: .9rem; text-align: center; padding: 1rem;
        }

        /* === Indicator cards === */
        .indicator-card {
            border: none; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
            background: #fff;
            padding: 1rem 1.25rem;
        }
        .indicator-label {
            font-size: .72rem; color: #94a3b8;
            text-transform: uppercase; font-weight: 600;
            letter-spacing: .05em; margin-bottom: .3rem;
        }
        .indicator-value { font-size: 1.35rem; font-weight: 700; color: #1e293b; line-height: 1; margin-bottom: .25rem; }
        .indicator-change { font-size: .8rem; font-weight: 600; }
        .indicator-sparkline { display: block; }
    </style>
</head>
<body class="has-sidebar">

<!-- 로딩 오버레이 -->
<div id="loading-overlay">
    <div class="text-center text-muted">
        <div class="spinner-border spinner-border-sm mb-2"></div>
        <div style="font-size:.85rem;">불러오는 중...</div>
    </div>
</div>

<!-- Sidebar navigation -->
<aside id="sidebar" class="offcanvas-lg offcanvas-start" tabindex="-1" aria-labelledby="sidebar-label">
    <div class="offcanvas-header border-bottom">
        <span id="sidebar-label" class="fw-bold">
            <i class="bi bi-bar-chart-line-fill text-primary"></i> My Portfolio
        </span>
        <button type="button" class="btn-close d-lg-none"
                data-bs-dismiss="offcanvas" data-bs-target="#sidebar" aria-label="Close"></button>
    </div>
    <nav class="offcanvas-body d-flex flex-column p-0">
        <a href="/" class="sidebar-link"><i class="bi bi-speedometer2 me-2"></i>대시보드</a>

        <div class="sidebar-group-label">개인종목</div>
        <div id="sidebar-assets"></div>

        <div class="sidebar-group-label">분석</div>
        <a href="/news.html" class="sidebar-link"><i class="bi bi-newspaper me-2"></i>뉴스 리포트</a>
        <a href="/market.html" class="sidebar-link active"><i class="bi bi-grid-3x3-gap me-2"></i>시장 상황판</a>

        <div class="sidebar-group-label">도구</div>
        <span class="sidebar-link disabled">가격 알림 <span class="badge text-bg-light">준비중</span></span>
        <span class="sidebar-link disabled">리밸런싱 <span class="badge text-bg-light">준비중</span></span>
        <span class="sidebar-link disabled">트레이드 저널 <span class="badge text-bg-light">준비중</span></span>
        <span class="sidebar-link disabled">수익 실현 계산기 <span class="badge text-bg-light">준비중</span></span>

        <div class="sidebar-group-label">기타</div>
        <span class="sidebar-link disabled">설정 <span class="badge text-bg-light">준비중</span></span>

        <div class="sidebar-footer">
            <button onclick="logout()" class="btn btn-sm btn-outline-secondary w-100">
                <i class="bi bi-box-arrow-right"></i> 로그아웃
            </button>
        </div>
    </nav>
</aside>

<!-- Mobile navbar (only visible <992px) -->
<nav class="navbar navbar-light bg-white border-bottom px-3 py-2 d-lg-none">
    <button class="btn btn-sm" type="button"
            data-bs-toggle="offcanvas" data-bs-target="#sidebar"
            aria-controls="sidebar" aria-label="메뉴 열기">
        <i class="bi bi-list fs-4"></i>
    </button>
    <span class="fw-semibold fs-6">시장 상황판</span>
    <span style="width:32px"></span>
</nav>

<div id="main-content" class="container-xl py-4" style="display:none;">

    <!-- 헤더 행: 제목 + 기간 탭 -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h1 class="mb-0" style="font-size:1.4rem; font-weight:700;">
            <i class="bi bi-grid-3x3-gap text-primary me-2"></i>시장 상황판
        </h1>
        <div class="period-tabs" id="period-tabs">
            <button class="period-tab-btn active" data-period="1d">1일</button>
            <button class="period-tab-btn" data-period="1w">1주</button>
            <button class="period-tab-btn" data-period="1mo">1개월</button>
            <button class="period-tab-btn" data-period="ytd">YTD</button>
        </div>
    </div>

    <!-- Heatmap section -->
    <div class="mb-4">
        <div id="heatmap-container">
            <div id="heatmap-loading">
                <div class="text-center">
                    <div class="spinner-border spinner-border-sm mb-2" style="color:#94a3b8;"></div>
                    <div style="font-size:.82rem;">히트맵 로딩 중...</div>
                </div>
            </div>
            <div id="heatmap-error">
                <div>
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    <span id="heatmap-error-msg">히트맵 데이터를 불러올 수 없습니다.</span>
                </div>
            </div>
            <svg id="heatmap-svg"></svg>
        </div>
    </div>

    <!-- Indicator widgets section -->
    <div class="mb-2">
        <div class="section-title">시장 지표</div>
        <div class="row g-3" id="indicators-grid">
            <!-- cards injected by JS -->
        </div>
    </div>

</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
const token = localStorage.getItem('portfolio_token');
if (!token) location.replace('/login.html');

function authHeaders() {
    return { 'Authorization': 'Bearer ' + token };
}

async function apiFetch(url) {
    const res = await fetch(url, { headers: authHeaders() });
    if (res.status === 401) {
        localStorage.removeItem('portfolio_token');
        location.replace('/login.html');
    }
    return res;
}

function logout() {
    localStorage.removeItem('portfolio_token');
    location.replace('/login.html');
}

// ── Heatmap color ─────────────────────────────────────────────────────────────
function heatColor(pct) {
    if (pct >= 3)   return '#15803d';
    if (pct >= 1)   return '#22c55e';
    if (pct > -1)   return '#4b5563';
    if (pct > -3)   return '#ef4444';
    return '#b91c1c';
}

// ── Heatmap renderer ──────────────────────────────────────────────────────────
let currentPeriod = '1d';

async function loadHeatmap(period) {
    const container = document.getElementById('heatmap-container');
    const loadingEl = document.getElementById('heatmap-loading');
    const errorEl   = document.getElementById('heatmap-error');
    const svg       = document.getElementById('heatmap-svg');

    // Reset state
    loadingEl.style.display = 'flex';
    errorEl.style.display   = 'none';
    d3.select('#heatmap-svg').selectAll('*').remove();

    let data;
    try {
        const res = await apiFetch(`/api/market/heatmap?period=${period}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
    } catch (e) {
        loadingEl.style.display = 'none';
        errorEl.style.display   = 'flex';
        document.getElementById('heatmap-error-msg').textContent =
            '히트맵 데이터를 불러올 수 없습니다. (' + e.message + ')';
        return;
    }

    loadingEl.style.display = 'none';

    // Build D3 hierarchy from API data
    // Expected: { name, children: [{ name (sector), children: [{ ticker, name, change_pct, market_cap }] }] }
    const width  = container.clientWidth;
    const height = container.clientHeight;

    const svgEl = d3.select('#heatmap-svg')
        .attr('width', width)
        .attr('height', height);

    const root = d3.hierarchy(data)
        .sum(d => d.market_cap || 1)
        .sort((a, b) => b.value - a.value);

    d3.treemap()
        .size([width, height])
        .paddingTop(18)
        .paddingInner(2)
        .paddingOuter(2)(root);

    // Draw sector labels (depth=1 nodes)
    svgEl.selectAll('.sector-label')
        .data(root.children || [])
        .enter()
        .append('text')
        .attr('class', 'sector-label')
        .attr('x', d => d.x0 + 4)
        .attr('y', d => d.y0 + 13)
        .attr('fill', '#94a3b8')
        .attr('font-size', '10px')
        .attr('font-weight', '700')
        .attr('font-family', 'Inter, sans-serif')
        .attr('text-anchor', 'start')
        .text(d => d.data.name);

    // Draw leaf cells
    const leaves = root.leaves();
    const cell = svgEl.selectAll('.cell')
        .data(leaves)
        .enter()
        .append('g')
        .attr('class', 'cell')
        .attr('transform', d => `translate(${d.x0},${d.y0})`);

    cell.append('rect')
        .attr('width',  d => Math.max(0, d.x1 - d.x0))
        .attr('height', d => Math.max(0, d.y1 - d.y0))
        .attr('fill',   d => heatColor(d.data.change_pct || 0))
        .attr('rx', 2)
        .attr('ry', 2);

    // Ticker text (always if cell is wide enough)
    cell.filter(d => (d.x1 - d.x0) > 28 && (d.y1 - d.y0) > 16)
        .append('text')
        .attr('x', d => (d.x1 - d.x0) / 2)
        .attr('y', d => {
            const h = d.y1 - d.y0;
            const showName = h > 52;
            const showPct  = h > 30;
            if (showName && showPct) return h / 2 - 10;
            if (showPct) return h / 2 - 4;
            return h / 2 + 5;
        })
        .attr('text-anchor', 'middle')
        .attr('fill', '#fff')
        .attr('font-size', d => {
            const w = d.x1 - d.x0;
            return w > 70 ? '12px' : '10px';
        })
        .attr('font-weight', '700')
        .attr('font-family', 'Inter, sans-serif')
        .text(d => d.data.ticker || d.data.name);

    // Change pct text
    cell.filter(d => (d.x1 - d.x0) > 28 && (d.y1 - d.y0) > 30)
        .append('text')
        .attr('x', d => (d.x1 - d.x0) / 2)
        .attr('y', d => {
            const h = d.y1 - d.y0;
            const showName = h > 52;
            if (showName) return h / 2 + 4;
            return h / 2 + 10;
        })
        .attr('text-anchor', 'middle')
        .attr('fill', 'rgba(255,255,255,0.85)')
        .attr('font-size', '10px')
        .attr('font-family', 'Inter, sans-serif')
        .text(d => {
            const pct = d.data.change_pct;
            if (pct == null) return '';
            return (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%';
        });

    // Name text (only if cell is tall enough)
    cell.filter(d => (d.x1 - d.x0) > 40 && (d.y1 - d.y0) > 52)
        .append('text')
        .attr('x', d => (d.x1 - d.x0) / 2)
        .attr('y', d => (d.y1 - d.y0) / 2 + 18)
        .attr('text-anchor', 'middle')
        .attr('fill', 'rgba(255,255,255,0.6)')
        .attr('font-size', '9px')
        .attr('font-family', 'Inter, sans-serif')
        .text(d => {
            const w = d.x1 - d.x0;
            const name = d.data.name || '';
            const maxLen = Math.floor(w / 6);
            return name.length > maxLen ? name.slice(0, maxLen) + '…' : name;
        });
}

// ── Period tabs ───────────────────────────────────────────────────────────────
document.getElementById('period-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.period-tab-btn');
    if (!btn) return;
    document.querySelectorAll('.period-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    loadHeatmap(currentPeriod);
});

// ── Sparkline ─────────────────────────────────────────────────────────────────
function buildSparkline(history, color) {
    if (!history || history.length < 2) return '';
    const W = 60, H = 28;
    const mn = Math.min(...history), mx = Math.max(...history);
    const range = mx - mn || 1;
    const pts = history.map((v, i) => {
        const x = (i / (history.length - 1)) * W;
        const y = H - ((v - mn) / range) * H;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    return `<svg width="${W}" height="${H}" class="indicator-sparkline"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

// ── Fear & Greed label ────────────────────────────────────────────────────────
function fearGreedLabel(value) {
    if (value <= 25) return { text: 'Extreme Fear', color: '#dc2626' };
    if (value <= 45) return { text: 'Fear', color: '#ef4444' };
    if (value <= 55) return { text: 'Neutral', color: '#6b7280' };
    if (value <= 75) return { text: 'Greed', color: '#16a34a' };
    return { text: 'Extreme Greed', color: '#15803d' };
}

// ── Indicator widgets ─────────────────────────────────────────────────────────
const WIDGET_META = [
    { key: 'fear_greed',       label: '공포·탐욕',        prefix: '',  suffix: '',  special: 'fear_greed' },
    { key: 'usd_krw',          label: 'USD/KRW',          prefix: '₩', suffix: '',  special: null },
    { key: 'btc_dominance',    label: 'BTC 도미넌스',     prefix: '',  suffix: '%', special: null },
    { key: 'vix',              label: 'VIX',              prefix: '',  suffix: '',  special: null },
    { key: 'dxy',              label: 'DXY',              prefix: '',  suffix: '',  special: null },
    { key: 'us10y',            label: 'US 10Y',           prefix: '',  suffix: '%', special: null },
    { key: 'kimchi_premium',   label: '김치프리미엄',     prefix: '',  suffix: '%', special: null },
    { key: 'jpy_krw',          label: 'JPY/KRW',          prefix: '',  suffix: '',  special: null },
];

async function loadIndicators() {
    let data;
    try {
        const res = await apiFetch('/api/market/indicators');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
    } catch (e) {
        console.error('Indicators load failed:', e);
        return;
    }

    const grid = document.getElementById('indicators-grid');
    grid.innerHTML = '';

    WIDGET_META.forEach(meta => {
        const d = data[meta.key] || {};
        const value     = d.value ?? null;
        const changePct = d.change_pct ?? null;
        const history   = d.history || [];

        // Determine color for change
        let changeColor = 'var(--color-neutral)';
        let changeText  = '—';
        if (meta.special === 'fear_greed' && value != null) {
            const fg = fearGreedLabel(value);
            changeColor = fg.color;
            changeText  = fg.text;
        } else if (changePct != null) {
            if (changePct > 0)      { changeColor = 'var(--color-up)';   changeText = `▲ ${changePct.toFixed(2)}%`; }
            else if (changePct < 0) { changeColor = 'var(--color-down)'; changeText = `▼ ${Math.abs(changePct).toFixed(2)}%`; }
            else                    { changeText = `— 0.00%`; }
        }

        // Sparkline color
        let sparkColor = '#6b7280';
        if (changePct != null) {
            if (changePct > 0) sparkColor = '#16a34a';
            else if (changePct < 0) sparkColor = '#dc2626';
        }

        const valueStr = value != null
            ? meta.prefix + value.toLocaleString('ko-KR', { maximumFractionDigits: 2 }) + meta.suffix
            : '—';

        const sparkSvg = buildSparkline(history, sparkColor);

        const col = document.createElement('div');
        col.className = 'col-6 col-md-3';
        col.innerHTML = `
            <div class="indicator-card d-flex flex-column gap-1">
                <div class="indicator-label">${meta.label}</div>
                <div class="indicator-value">${valueStr}</div>
                <div class="indicator-change" style="color:${changeColor}">${changeText}</div>
                ${sparkSvg}
            </div>`;
        grid.appendChild(col);
    });
}

// ── Sidebar assets (optional, same pattern as news.html) ─────────────────────
async function loadSidebarAssets() {
    try {
        const res = await apiFetch('/api/portfolio');
        if (!res.ok) return;
        const portfolio = await res.json();
        const assets = portfolio.assets || [];
        const container = document.getElementById('sidebar-assets');
        if (!assets.length) { container.innerHTML = ''; return; }
        container.innerHTML = assets.slice(0, 8).map(a => {
            const pnl = a.unrealized_pnl_pct;
            const pnlClass = pnl > 0 ? 'text-up' : pnl < 0 ? 'text-down' : 'text-neutral';
            const pnlStr = pnl != null ? (pnl >= 0 ? '+' : '') + pnl.toFixed(1) + '%' : '';
            return `<a href="/" class="sidebar-stock">
                <span class="stock-ticker">${a.ticker || ''}</span>
                <span class="stock-name">${a.name || ''}</span>
                <span class="stock-pnl ${pnlClass}">${pnlStr}</span>
            </a>`;
        }).join('');
    } catch (e) {
        // non-critical
    }
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';

    // Load heatmap and indicators in parallel; sidebar assets best-effort
    await Promise.all([
        loadHeatmap(currentPeriod),
        loadIndicators(),
        loadSidebarAssets(),
    ]);
})();
</script>
</body>
