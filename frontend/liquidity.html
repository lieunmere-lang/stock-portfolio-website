<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-180.png">
    <title>유동성 흐름 — My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
    <style>
        :root {
            --color-up: #16a34a;
            --color-down: #dc2626;
            --color-neutral: #6b7280;
            --bg-main: #f1f5f9;
            --card-radius: 0.875rem;
        }
        body { background: var(--bg-main); font-family: 'Inter', sans-serif; color: #1e293b; }
        .navbar { box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .section-card {
            border: none; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .section-title {
            font-size: .8rem; font-weight: 600; letter-spacing: .06em;
            text-transform: uppercase; color: #64748b; margin-bottom: 1rem;
        }
        .summary-card {
            border: none; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .icon-badge {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        /* Sidebar */
        html { scroll-behavior: smooth; }
        @media (min-width: 992px) {
            #sidebar {
                position: fixed; top: 0; left: 0;
                width: 240px; height: 100vh;
                border-right: 1px solid #e2e8f0;
                background: #fff;
                display: flex; flex-direction: column;
                z-index: 20;
            }
            body.has-sidebar > nav.navbar,
            body.has-sidebar > #main-content { margin-left: 240px; }
        }
        .sidebar-link {
            display: flex; align-items: center; gap: .6rem;
            padding: .55rem 1rem;
            color: #475569; text-decoration: none;
            font-size: .88rem;
            border-left: 3px solid transparent;
        }
        .sidebar-link:hover:not(.disabled) { background: #f8fafc; color: #0f172a; }
        .sidebar-link.active {
            background: #eff6ff; color: #1d4ed8;
            border-left-color: #1d4ed8; font-weight: 600;
        }
        .sidebar-link.disabled { color: #cbd5e1; cursor: not-allowed; }
        .sidebar-group-label {
            font-size: .7rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: .08em;
            padding: 1rem 1rem .4rem;
        }
        .sidebar-footer {
            margin-top: auto; padding: 1rem;
            border-top: 1px solid #e2e8f0;
        }
        .sidebar-link .badge { margin-left: auto; }

        /* Liquidity specific */
        .asset-comment {
            padding: .6rem .8rem;
            border-left: 3px solid #e2e8f0;
            margin-bottom: .5rem;
            font-size: .82rem;
            background: #f8fafc;
            border-radius: 0 8px 8px 0;
        }
        .asset-comment.up { border-left-color: var(--color-up); }
        .asset-comment.down { border-left-color: var(--color-down); }
        .asset-comment .label { font-weight: 700; }
        .asset-comment .change { font-weight: 600; font-size: .78rem; }
        .summary-box {
            background: linear-gradient(135deg, #1e293b, #334155);
            color: #fff;
            border-radius: var(--card-radius);
            padding: 1.2rem;
            font-size: .85rem;
            line-height: 1.6;
        }
        #sankey-container svg { width: 100%; }

        /* Mobile styles in /css/responsive.css */
    </style>
</head>
<body class="has-sidebar">

<script src="/js/sidebar.js"></script>

<!-- Main content -->
<div id="main-content" class="container-fluid py-4" style="max-width:1200px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-water me-2 text-primary"></i>유동성 흐름</h4>
        <div class="btn-group btn-group-sm" id="period-btns">
            <button class="btn btn-outline-secondary" data-days="90">3개월</button>
            <button class="btn btn-outline-secondary" data-days="180">6개월</button>
            <button class="btn btn-outline-secondary active" data-days="365">1년</button>
        </div>
    </div>

    <!-- 로딩 -->
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="text-muted mt-2" style="font-size:.85rem;">유동성 데이터 수집 중... (최초 로딩 시 30초 이상 소요될 수 있습니다)</p>
    </div>

    <!-- 콘텐츠 (로딩 후 표시) -->
    <div id="content" style="display:none;">

        <!-- M2 요약 카드 -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-2">
                <div class="summary-card card h-100">
                    <div class="card-body text-center py-3">
                        <div class="text-muted" style="font-size:.68rem;font-weight:600;">M2 통화량</div>
                        <div id="m2-value" class="fw-bold fs-6 mt-1">—</div>
                        <div id="m2-change" class="fw-semibold" style="font-size:.75rem;">—</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="summary-card card h-100">
                    <div class="card-body text-center py-3">
                        <div class="text-muted" style="font-size:.68rem;font-weight:600;">미국 주식</div>
                        <div id="stocks-value" class="fw-bold fs-6 mt-1">—</div>
                        <div id="stocks-change" class="fw-semibold" style="font-size:.75rem;">—</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="summary-card card h-100">
                    <div class="card-body text-center py-3">
                        <div class="text-muted" style="font-size:.68rem;font-weight:600;">채권</div>
                        <div id="bonds-value" class="fw-bold fs-6 mt-1">—</div>
                        <div id="bonds-change" class="fw-semibold" style="font-size:.75rem;">—</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="summary-card card h-100">
                    <div class="card-body text-center py-3">
                        <div class="text-muted" style="font-size:.68rem;font-weight:600;">현금성(MMF)</div>
                        <div id="mmf-value" class="fw-bold fs-6 mt-1">—</div>
                        <div id="mmf-change" class="fw-semibold" style="font-size:.75rem;">—</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="summary-card card h-100">
                    <div class="card-body text-center py-3">
                        <div class="text-muted" style="font-size:.68rem;font-weight:600;">금</div>
                        <div id="gold-value" class="fw-bold fs-6 mt-1">—</div>
                        <div id="gold-change" class="fw-semibold" style="font-size:.75rem;">—</div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-2">
                <div class="summary-card card h-100">
                    <div class="card-body text-center py-3">
                        <div class="text-muted" style="font-size:.68rem;font-weight:600;">코인</div>
                        <div id="crypto-value" class="fw-bold fs-6 mt-1">—</div>
                        <div id="crypto-change" class="fw-semibold" style="font-size:.75rem;">—</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 스택 영역 차트 -->
        <div class="card section-card mb-4">
            <div class="card-body">
                <div class="section-title">자산군별 추이 (정규화)</div>
                <div style="position:relative;height:320px;">
                    <canvas id="stacked-chart"></canvas>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <!-- 산키 다이어그램 -->
            <div class="col-12 col-md-6">
                <div class="card section-card h-100">
                    <div class="card-body">
                        <div class="section-title">유동성 흐름 (전월 대비)</div>
                        <div id="sankey-container" style="min-height:280px;"></div>
                    </div>
                </div>
            </div>

            <!-- 코멘트 -->
            <div class="col-12 col-md-6">
                <div class="card section-card h-100">
                    <div class="card-body">
                        <div class="section-title">자산군별 해석</div>
                        <div id="comments-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 종합 해석 -->
        <div id="summary-box" class="summary-box mb-4"></div>
    </div>
</div>

<script>
const API = location.origin;

// ── Auth ──
function getToken() {
    const t = localStorage.getItem('portfolio_token');
    if (!t) { location.href = '/login.html'; return null; }
    try {
        const payload = JSON.parse(atob(t.split('.')[1]));
        if (payload.exp && payload.exp * 1000 < Date.now()) {
            localStorage.removeItem('portfolio_token');
            location.href = '/login.html';
            return null;
        }
    } catch (e) { /* ignore */ }
    return t;
}
function logout() { localStorage.removeItem('portfolio_token'); location.href = '/login.html'; }
const token = getToken();
const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

// ── 색상 맵 ──
const COLORS = {
    stocks: '#3b82f6',
    bonds: '#64748b',
    mmf: '#f59e0b',
    gold: '#eab308',
    crypto: '#8b5cf6',
    commodities: '#14b8a6',
    m2: '#1e293b',
};
const LABELS = {
    m2: '글로벌 M2',
    stocks: '미국 주식',
    bonds: '채권',
    mmf: '현금성(MMF)',
    gold: '금',
    crypto: '코인',
    commodities: '원자재',
};
const ICONS = {
    m2: 'bank',
    stocks: 'graph-up-arrow',
    bonds: 'file-earmark-text',
    mmf: 'cash-stack',
    gold: 'gem',
    crypto: 'currency-bitcoin',
    commodities: 'droplet-half',
};

let stackedChart = null;

// ── 데이터 로드 ──
async function loadLiquidity(days = 365) {
    document.getElementById('loading').style.display = '';
    document.getElementById('content').style.display = 'none';

    try {
        const res = await fetch(`${API}/api/liquidity/flow?days=${days}`, { headers });
        if (!res.ok) throw new Error('API 오류: ' + res.status);
        const data = await res.json();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = '';

        renderSummaryCards(data.current);
        renderStackedChart(data.monthly);
        renderSankey(data.sankey);
        renderComments(data.comments);
    } catch (e) {
        document.getElementById('loading').innerHTML =
            `<p class="text-danger"><i class="bi bi-exclamation-triangle me-2"></i>${e.message}</p>`;
    }
}

// ── 요약 카드 ──
function renderSummaryCards(current) {
    const keys = ['m2', 'stocks', 'bonds', 'mmf', 'gold', 'crypto'];
    keys.forEach(key => {
        const d = current[key] || {};
        const valEl = document.getElementById(`${key}-value`);
        const chgEl = document.getElementById(`${key}-change`);
        if (!valEl) return;

        let valText = '—';
        if (d.value != null) {
            if (key === 'm2') valText = `$${(d.value / 1000).toFixed(1)}조`;
            else if (key === 'mmf') valText = `$${(d.value / 1e6).toFixed(2)}조`;
            else if (key === 'crypto') valText = `$${d.value.toFixed(2)}조`;
            else valText = `$${d.value.toFixed(1)}`;
        }
        valEl.textContent = valText;

        const chg = d.change_pct || 0;
        const sign = chg >= 0 ? '+' : '';
        chgEl.textContent = `${sign}${chg.toFixed(1)}%`;
        chgEl.style.color = chg > 0 ? 'var(--color-up)' : chg < 0 ? 'var(--color-down)' : 'var(--color-neutral)';
    });
}

// ── 스택 영역 차트 (정규화) ──
function renderStackedChart(monthly) {
    const keys = ['stocks', 'bonds', 'mmf', 'gold', 'crypto', 'commodities'];

    // 공통 날짜축 만들기 (stocks 기준)
    const baseDates = (monthly.stocks || []).map(d => d.date);
    if (!baseDates.length) return;

    // 각 시리즈를 날짜 맵으로 변환
    const seriesMap = {};
    keys.forEach(key => {
        const map = {};
        (monthly[key] || []).forEach(d => { map[d.date] = d.value; });
        seriesMap[key] = map;
    });

    // 정규화: 첫 값 = 100 기준
    const datasets = keys.map(key => {
        const map = seriesMap[key];
        const values = baseDates.map(d => map[d] || null);
        const firstVal = values.find(v => v != null);
        const normalized = values.map(v => v != null && firstVal ? (v / firstVal * 100) : null);
        return {
            label: LABELS[key],
            data: normalized,
            borderColor: COLORS[key],
            backgroundColor: COLORS[key] + '18',
            fill: false,
            tension: 0.3,
            pointRadius: 0,
            pointHoverRadius: 4,
            borderWidth: 2,
        };
    });

    const ctx = document.getElementById('stacked-chart');
    if (stackedChart) stackedChart.destroy();
    stackedChart = new Chart(ctx, {
        type: 'line',
        data: { labels: baseDates, datasets },
        options: {
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { usePointStyle: true, padding: 15, font: { size: 11 } }
                },
                tooltip: {
                    callbacks: {
                        label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y ? ctx.parsed.y.toFixed(1) : '—'}`,
                    }
                }
            },
            scales: {
                x: {
                    ticks: { maxTicksLimit: 12, font: { size: 10 }, maxRotation: 0 },
                    grid: { display: false },
                },
                y: {
                    ticks: {
                        callback: v => v.toFixed(0),
                        font: { size: 10 },
                    },
                    grid: { color: '#f1f5f9' },
                    title: { display: true, text: '정규화 (시작=100)', font: { size: 10 } },
                }
            },
            maintainAspectRatio: false,
        }
    });
}

// ── 산키 다이어그램 ──
function renderSankey(sankey) {
    const container = document.getElementById('sankey-container');
    container.innerHTML = '';

    if (!sankey || !sankey.nodes || !sankey.links) {
        container.innerHTML = '<p class="text-muted" style="font-size:.8rem;">데이터 없음</p>';
        return;
    }

    const width = container.clientWidth || 500;
    const height = 280;

    const svg = d3.select(container)
        .append('svg')
        .attr('viewBox', `0 0 ${width} ${height}`)
        .attr('preserveAspectRatio', 'xMidYMid meet');

    const sankeyGen = d3.sankey()
        .nodeWidth(20)
        .nodePadding(14)
        .extent([[1, 5], [width - 1, height - 5]]);

    const data = {
        nodes: sankey.nodes.map((d, i) => ({ ...d, index: i })),
        links: sankey.links.map(d => ({ ...d })),
    };

    const graph = sankeyGen(data);

    // 링크 색상: up=초록, down=빨강
    const linkColor = d => {
        if (d.direction === 'up') return 'rgba(22,163,74,0.35)';
        if (d.direction === 'down') return 'rgba(220,38,38,0.35)';
        return 'rgba(148,163,184,0.3)';
    };

    svg.append('g')
        .selectAll('path')
        .data(graph.links)
        .join('path')
        .attr('d', d3.sankeyLinkHorizontal())
        .attr('fill', 'none')
        .attr('stroke', linkColor)
        .attr('stroke-width', d => Math.max(d.width, 2))
        .attr('opacity', 0.8);

    // 노드
    const nodeColors = ['#1e293b', '#3b82f6', '#64748b', '#f59e0b', '#eab308', '#8b5cf6', '#14b8a6'];
    svg.append('g')
        .selectAll('rect')
        .data(graph.nodes)
        .join('rect')
        .attr('x', d => d.x0)
        .attr('y', d => d.y0)
        .attr('width', d => d.x1 - d.x0)
        .attr('height', d => Math.max(d.y1 - d.y0, 1))
        .attr('fill', (d, i) => nodeColors[i % nodeColors.length])
        .attr('rx', 3);

    // 라벨
    svg.append('g')
        .selectAll('text')
        .data(graph.nodes)
        .join('text')
        .attr('x', d => d.x0 < width / 2 ? d.x1 + 8 : d.x0 - 8)
        .attr('y', d => (d.y0 + d.y1) / 2)
        .attr('dy', '0.35em')
        .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .attr('fill', '#334155')
        .text(d => d.name);
}

// ── 코멘트 렌더링 ──
function renderComments(comments) {
    const list = document.getElementById('comments-list');
    const keys = ['m2', 'stocks', 'bonds', 'mmf', 'gold', 'crypto', 'commodities'];
    let html = '';

    keys.forEach(key => {
        const comment = comments.per_asset[key];
        if (!comment) return;
        const icon = ICONS[key] || 'circle';
        const color = COLORS[key] || '#64748b';
        // 방향에 따라 스타일
        const isUp = comment.includes('확장') || comment.includes('유입') || comment.includes('증가') || comment.includes('매수') || comment.includes('랠리') || comment.includes('선반영');
        const isDown = comment.includes('긴축') || comment.includes('유출') || comment.includes('감소') || comment.includes('회피') || comment.includes('위축');
        const cls = isUp ? 'up' : isDown ? 'down' : '';

        html += `<div class="asset-comment ${cls}">
            <span class="label" style="color:${color};"><i class="bi bi-${icon} me-1"></i>${LABELS[key]}</span>
            <div class="mt-1" style="color:#475569;">${comment}</div>
        </div>`;
    });

    list.innerHTML = html;

    // 종합 해석
    document.getElementById('summary-box').innerHTML =
        `<div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;opacity:.7;margin-bottom:.5rem;">종합 해석</div>
         <div>${comments.summary}</div>`;
}

// ── 기간 버튼 ──
document.getElementById('period-btns').addEventListener('click', e => {
    const btn = e.target.closest('button[data-days]');
    if (!btn) return;
    document.querySelectorAll('#period-btns button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadLiquidity(+btn.dataset.days);
});

// ── 초기 로드 ──
loadLiquidity(365);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
