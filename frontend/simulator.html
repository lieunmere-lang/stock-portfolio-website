<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/icon-180.png">
    <title>복리 시뮬레이터 — My Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/responsive.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --color-up: #16a34a;
            --color-down: #dc2626;
            --color-neutral: #6b7280;
            --bg-main: #f1f5f9;
            --card-radius: 0.875rem;
        }
        body { background: var(--bg-main); font-family: 'Inter', sans-serif; color: #1e293b; }
        .navbar { box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .section-card {
            border: none; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .section-title {
            font-size: .8rem; font-weight: 600; letter-spacing: .06em;
            text-transform: uppercase; color: #64748b; margin-bottom: 1rem;
        }
        .summary-card {
            border: none; border-radius: var(--card-radius);
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }
        .icon-badge {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        /* Sidebar */
        html { scroll-behavior: smooth; }
        @media (min-width: 992px) {
            #sidebar {
                position: fixed; top: 0; left: 0;
                width: 240px; height: 100vh;
                border-right: 1px solid #e2e8f0;
                background: #fff;
                display: flex; flex-direction: column;
                z-index: 20;
            }
            body.has-sidebar > nav.navbar,
            body.has-sidebar > #main-content { margin-left: 240px; }
        }
        .sidebar-link {
            display: flex; align-items: center; gap: .6rem;
            padding: .55rem 1rem;
            color: #475569; text-decoration: none;
            font-size: .88rem;
            border-left: 3px solid transparent;
        }
        .sidebar-link:hover:not(.disabled) { background: #f8fafc; color: #0f172a; }
        .sidebar-link.active {
            background: #eff6ff; color: #1d4ed8;
            border-left-color: #1d4ed8; font-weight: 600;
        }
        .sidebar-link.disabled { color: #cbd5e1; cursor: not-allowed; }
        .sidebar-group-label {
            font-size: .7rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; letter-spacing: .08em;
            padding: 1rem 1rem .4rem;
        }
        .sidebar-footer {
            margin-top: auto; padding: 1rem;
            border-top: 1px solid #e2e8f0;
        }
        .sidebar-link .badge { margin-left: auto; }

        /* Simulator specific */
        .input-group-text { min-width: 48px; justify-content: center; font-size: .85rem; }
        .sim-table th { font-size: .78rem; font-weight: 600; color: #64748b; white-space: nowrap; }
        .sim-table td { font-size: .85rem; white-space: nowrap; }
        .sim-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
        .sim-table tr:last-child { background: #eff6ff; font-weight: 600; }
        .result-highlight {
            font-size: 1.8rem; font-weight: 700; color: #1d4ed8;
        }

        /* Mobile styles in /css/responsive.css */
    </style>
</head>
<body class="has-sidebar">

<script src="/js/sidebar.js"></script>

<!-- Main content -->
<div id="main-content" class="container-fluid py-4" style="max-width:1200px;">
    <h4 class="fw-bold mb-4"><i class="bi bi-calculator me-2 text-primary"></i>복리 시뮬레이터</h4>

    <!-- 입력 폼 -->
    <div class="card section-card mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="section-title mb-0">시뮬레이션 설정</div>
                <button class="btn btn-sm btn-outline-primary" id="btn-load-portfolio">
                    <i class="bi bi-wallet2 me-1"></i>내 포트폴리오 불러오기
                </button>
            </div>
            <div class="row g-3">
                <div class="col-6 col-md-4 col-lg">
                    <label class="form-label fw-semibold" style="font-size:.82rem;">시작 금액</label>
                    <div class="input-group input-group-sm">
                        <input type="number" class="form-control" id="input-principal" value="200000000" min="0" step="10000000">
                        <span class="input-group-text">원</span>
                    </div>
                </div>
                <div class="col-6 col-md-4 col-lg">
                    <label class="form-label fw-semibold" style="font-size:.82rem;">연 수익률</label>
                    <div class="input-group input-group-sm">
                        <input type="number" class="form-control" id="input-rate" value="20" min="0" max="200" step="1">
                        <span class="input-group-text">%</span>
                    </div>
                </div>
                <div class="col-6 col-md-4 col-lg">
                    <label class="form-label fw-semibold" style="font-size:.82rem;">월 적립금</label>
                    <div class="input-group input-group-sm">
                        <input type="number" class="form-control" id="input-monthly" value="3000000" min="0" step="100000">
                        <span class="input-group-text">원</span>
                    </div>
                </div>
                <div class="col-6 col-md-3 col-lg">
                    <label class="form-label fw-semibold" style="font-size:.82rem;">현재 나이</label>
                    <div class="input-group input-group-sm">
                        <input type="number" class="form-control" id="input-age" value="33" min="1" max="100">
                        <span class="input-group-text">세</span>
                    </div>
                </div>
                <div class="col-6 col-md-3 col-lg">
                    <label class="form-label fw-semibold" style="font-size:.82rem;">목표 나이</label>
                    <div class="input-group input-group-sm">
                        <input type="number" class="form-control" id="input-target" value="40" min="2" max="100">
                        <span class="input-group-text">세</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 결과 요약 카드 -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="summary-card card h-100">
                <div class="card-body text-center">
                    <div class="text-muted" style="font-size:.75rem; font-weight:600;">최종 자산</div>
                    <div id="result-total" class="result-highlight mt-1">—</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="summary-card card h-100">
                <div class="card-body text-center">
                    <div class="text-muted" style="font-size:.75rem; font-weight:600;">누적 투자금</div>
                    <div id="result-invested" class="fw-bold fs-5 mt-1" style="color:#475569;">—</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="summary-card card h-100">
                <div class="card-body text-center">
                    <div class="text-muted" style="font-size:.75rem; font-weight:600;">총 수익</div>
                    <div id="result-profit" class="fw-bold fs-5 mt-1" style="color:var(--color-up);">—</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="summary-card card h-100">
                <div class="card-body text-center">
                    <div class="text-muted" style="font-size:.75rem; font-weight:600;">총 수익률</div>
                    <div id="result-return" class="fw-bold fs-5 mt-1" style="color:var(--color-up);">—</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 차트 -->
    <div class="card section-card mb-4">
        <div class="card-body">
            <div class="section-title">자산 성장 차트</div>
            <div style="height:220px;"><canvas id="growth-chart"></canvas></div>
        </div>
    </div>

    <!-- 시나리오 비교 -->
    <div id="scenario-section" class="card section-card mb-4" style="display:none;">
        <div class="card-body">
            <div class="section-title">시나리오 비교 (목표 나이 기준)</div>
            <div class="table-responsive">
                <table class="table table-sm sim-table mb-0">
                    <thead>
                        <tr>
                            <th>시나리오</th>
                            <th class="text-end">연 수익률</th>
                            <th class="text-end">최종 자산</th>
                            <th class="text-end">총 수익</th>
                            <th class="text-end">총 수익률</th>
                        </tr>
                    </thead>
                    <tbody id="scenario-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 연도별 테이블 -->
    <div class="card section-card">
        <div class="card-body">
            <div class="section-title">연도별 상세</div>
            <div class="table-responsive">
                <table class="table table-sm sim-table mb-0">
                    <thead>
                        <tr>
                            <th>나이</th>
                            <th class="text-end">연초 자산</th>
                            <th class="text-end">연간 적립</th>
                            <th class="text-end">연간 수익</th>
                            <th class="text-end">연말 자산</th>
                            <th class="text-end">누적 투자금</th>
                            <th class="text-end">누적 수익</th>
                        </tr>
                    </thead>
                    <tbody id="sim-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const API = location.origin;

// ── Auth ──
function getToken() {
    const t = localStorage.getItem('portfolio_token');
    if (!t) { location.href = '/login.html'; return null; }
    try {
        const payload = JSON.parse(atob(t.split('.')[1]));
        if (payload.exp && payload.exp * 1000 < Date.now()) {
            localStorage.removeItem('portfolio_token');
            location.href = '/login.html';
            return null;
        }
    } catch (e) { /* ignore parse errors */ }
    return t;
}
function logout() { localStorage.removeItem('portfolio_token'); location.href = '/login.html'; }

const token = getToken();

// ── 숫자 포맷 ──
function formatKRW(n) {
    if (n === null || n === undefined) return '—';
    const abs = Math.abs(n);
    if (abs >= 1e8) return (n / 1e8).toFixed(2) + '억';
    if (abs >= 1e4) return Math.round(n / 1e4).toLocaleString('ko-KR') + '만';
    return Math.round(n).toLocaleString('ko-KR') + '원';
}

function formatFull(n) {
    return Math.round(n).toLocaleString('ko-KR') + '원';
}

// ── 시뮬레이션 계산 ──
let chart = null;

function calculate() {
    const principal = parseFloat(document.getElementById('input-principal').value) || 0;
    const rate = (parseFloat(document.getElementById('input-rate').value) || 0) / 100;
    const monthly = parseFloat(document.getElementById('input-monthly').value) || 0;
    const ageNow = parseInt(document.getElementById('input-age').value) || 33;
    const ageTarget = parseInt(document.getElementById('input-target').value) || 40;

    if (ageTarget <= ageNow) {
        document.getElementById('sim-tbody').innerHTML =
            '<tr><td colspan="7" class="text-center text-muted py-3">목표 나이는 현재 나이보다 커야 합니다.</td></tr>';
        return;
    }

    const years = ageTarget - ageNow;
    const annualDeposit = monthly * 12;
    const rows = [];
    let balance = principal;
    let totalInvested = principal;

    for (let i = 0; i < years; i++) {
        const startBalance = balance;
        const yearDeposit = annualDeposit;
        const endBalance = (startBalance + yearDeposit) * (1 + rate);
        const yearProfit = endBalance - startBalance - yearDeposit;
        totalInvested += yearDeposit;

        rows.push({
            age: ageNow + i + 1,
            start: startBalance,
            deposit: yearDeposit,
            profit: yearProfit,
            end: endBalance,
            totalInvested: totalInvested,
            totalProfit: endBalance - totalInvested,
        });

        balance = endBalance;
    }

    // 요약 카드 업데이트
    const finalBalance = rows.length > 0 ? rows[rows.length - 1].end : principal;
    const finalInvested = rows.length > 0 ? rows[rows.length - 1].totalInvested : principal;
    const finalProfit = finalBalance - finalInvested;
    const finalReturn = finalInvested > 0 ? (finalProfit / finalInvested * 100) : 0;

    document.getElementById('result-total').textContent = formatKRW(finalBalance);
    document.getElementById('result-invested').textContent = formatKRW(finalInvested);
    document.getElementById('result-profit').textContent = '+' + formatKRW(finalProfit);
    document.getElementById('result-return').textContent = '+' + finalReturn.toFixed(1) + '%';

    // 테이블 렌더링
    const tbody = document.getElementById('sim-tbody');
    tbody.innerHTML = '';

    rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="fw-semibold">${r.age}세</td>
            <td class="num">${formatFull(r.start)}</td>
            <td class="num">${formatFull(r.deposit)}</td>
            <td class="num" style="color:var(--color-up);">+${formatFull(r.profit)}</td>
            <td class="num fw-semibold">${formatFull(r.end)}</td>
            <td class="num">${formatFull(r.totalInvested)}</td>
            <td class="num" style="color:var(--color-up);">+${formatFull(r.totalProfit)}</td>
        `;
        tbody.appendChild(tr);
    });

    // 차트 업데이트
    renderChart(rows, ageNow, principal);
}

function renderChart(rows, ageNow, principal) {
    const labels = [ageNow + '세', ...rows.map(r => r.age + '세')];
    const assetData = [principal, ...rows.map(r => r.end)];
    const investedData = [principal, ...rows.map(r => r.totalInvested)];

    const ctx = document.getElementById('growth-chart').getContext('2d');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: [
                {
                    label: '총 자산 (복리)',
                    data: assetData,
                    borderColor: '#1d4ed8',
                    backgroundColor: 'rgba(29,78,216,0.08)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    borderWidth: 2.5,
                },
                {
                    label: '누적 투자금 (원금)',
                    data: investedData,
                    borderColor: '#94a3b8',
                    backgroundColor: 'rgba(148,163,184,0.06)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    borderWidth: 2,
                    borderDash: [6, 3],
                },
            ],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            return ctx.dataset.label + ': ' + formatKRW(ctx.parsed.y);
                        }
                    }
                },
                legend: {
                    position: 'bottom',
                    labels: { usePointStyle: true, padding: 20, font: { size: 12 } }
                }
            },
            scales: {
                y: {
                    ticks: {
                        callback: function(val) { return formatKRW(val); },
                        font: { size: 11 },
                    },
                    grid: { color: 'rgba(0,0,0,.05)' },
                },
                x: {
                    ticks: { font: { size: 11 } },
                    grid: { display: false },
                }
            }
        }
    });
}

// ── 입력 이벤트 바인딩 (실시간 재계산) ──
['input-principal', 'input-rate', 'input-monthly', 'input-age', 'input-target'].forEach(id => {
    document.getElementById(id).addEventListener('input', calculate);
});

// 초기 계산
calculate();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
