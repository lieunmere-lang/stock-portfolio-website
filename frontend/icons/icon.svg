<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="diamond-face" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="diamond-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="diamond-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5f3fc"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Diamond shadow -->
  <ellipse cx="256" cy="420" rx="100" ry="20" fill="#000" opacity="0.2"/>
  <!-- Diamond top facets -->
  <polygon points="256,80 140,190 256,230" fill="url(#diamond-left)"/>
  <polygon points="256,80 372,190 256,230" fill="url(#diamond-right)"/>
  <!-- Diamond top bar -->
  <polygon points="140,190 372,190 256,230" fill="#22d3ee"/>
  <!-- Diamond bottom left -->
  <polygon points="140,190 256,400 256,230" fill="url(#diamond-face)"/>
  <!-- Diamond bottom right -->
  <polygon points="372,190 256,400 256,230" fill="#0891b2"/>
  <!-- Shine -->
  <polygon points="256,80 200,170 256,190 310,170" fill="url(#shine)"/>
  <!-- Sparkles -->
  <circle cx="160" cy="130" r="4" fill="#fff" opacity="0.7"/>
  <circle cx="145" cy="145" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="370" cy="280" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="130" cy="300" r="3" fill="#fff" opacity="0.4"/>
  <!-- Small chart line at bottom -->
  <polyline points="100,450 160,440 220,445 280,430 340,435 400,420" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
